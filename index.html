function syncPreDraft(){if(!S.preDraft)return;var noteEl=document.getElementById('pd-note');if(noteEl)S.preDraft.note=noteEl.value;var ad=document.getElementById('pd-addr');if(ad&&S.preDraft.customer)S.preDraft.customer.addr=ad.value;}
/* R5 — thêm khách mới ngay trong Đặt trước, lưu thẳng vào danh bạ Khách hàng */
function preAddCustomer(){syncPreDraft();S._khachCb=function(c){S.preDraft.customer={name:c.name,phone:(c.phone&&c.phone!='—')?c.phone:'',addr:c.addr||''};if(c.addr)S.preDraft.mode='giao';S.preSearch='';render('dattruoc_new');};openKhach();}
function preClearCustomer(){syncPreDraft();S.preDraft.customer=null;S.preSearch='';render('dattruoc_new');}
/* E1 — bánh xe cuộn giờ/phút (mô phỏng) */
function twLabel(){return ('0'+(S._timeH||0)).slice(-2)+':'+('0'+(S._timeM||0)).slice(-2);}
function openTimeWheel(){syncPreDraft();var cur=(S.preDraft&&S.preDraft.time)||'';var hm=cur.split(':');var h=parseInt(hm[0]),m=parseInt(hm[1]);S._timeH=isNaN(h)?17:h;S._timeM=isNaN(m)?0:(Math.round(m/5)*5)%60;mkSheet('tw-dia','<div id="tw-body"></div>');renderTimeWheelBody();}
function twCol(type,vals,cur){return '<div class="twcol" style="height:176px;overflow-y:auto;width:78px;scroll-snap-type:y mandatory">'+'<div style="height:68px"></div>'+vals.map(function(v){var on=v==cur;return '<div onclick="setTimeWheel(\''+type+'\','+v+')" style="height:40px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-size:'+(on?'21px':'17px')+';font-weight:'+(on?'800':'500')+';color:'+(on?'var(--blue)':'var(--ink3)')+';cursor:pointer">'+('0'+v).slice(-2)+'</div>';}).join('')+'<div style="height:68px"></div></div>';}
function renderTimeWheelBody(){var el=document.getElementById('tw-body');if(!el)return;var hrs=[];for(var h=0;h<24;h++)hrs.push(h);var mins=[];for(var m=0;m<60;m+=5)mins.push(m);
  el.innerHTML='<div class="grab"></div><div style="font-size:17px;font-weight:700;margin-bottom:2px">Chọn giờ hẹn</div><div class="muted tiny" style="margin-bottom:10px">Chạm số để chọn giờ : phút</div>'+
    '<div style="position:relative;display:flex;justify-content:center;align-items:center;gap:4px">'+
      '<div style="position:absolute;left:30px;right:30px;top:50%;transform:translateY(-50%);height:40px;background:var(--blue-l);border-radius:9px;pointer-events:none"></div>'+
      twCol('h',hrs,S._timeH)+'<div style="font-size:22px;font-weight:800;color:var(--ink2)">:</div>'+twCol('m',mins,S._timeM)+
    '</div>'+
    '<div style="text-align:center;margin-top:8px;font-size:13px;color:var(--ink2)">Giờ hẹn: <b style="color:var(--blue)">'+twLabel()+'</b></div>'+
    '<button class="btn" style="margin-top:12px" onclick="applyTimeWheel()">Xong</button>';}
function setTimeWheel(type,v){if(type=='h')S._timeH=v;else S._timeM=v;renderTimeWheelBody();}
function applyTimeWheel(){if(!S.preDraft)S.preDraft={mode:'lay'};S.preDraft.time=twLabel();rmSheet('tw-dia');render('dattruoc_new');}
/* F — tìm khách bằng tên hoặc 4 số cuối SĐT */
function renderPreCustList(){var el=document.getElementById('pre-cust-list');if(!el)return;var q=(S.preSearch||'').toLowerCase().trim();var qd=q.replace(/\D/g,'');
  if(!S.customers.length){el.innerHTML='<div class="muted tiny" style="padding:2px 2px 10px">Chưa có khách nào — bấm "Thêm khách hàng" để lưu khách đầu tiên.</div>';return;}
  var res=S.customers.filter(function(c){if(!q)return true;var nm=(c.name||'').toLowerCase();var ph=(c.phone||'').replace(/\D/g,'');return nm.indexOf(q)>=0||(qd&&ph.indexOf(qd)>=0);});
  if(!res.length){el.innerHTML='<div class="muted tiny" style="padding:2px 2px 10px">Không thấy khách khớp — bấm "Thêm khách hàng" để lưu khách mới.</div>';return;}
  el.innerHTML='<div style="border:1px solid var(--line2);border-radius:10px;margin-bottom:14px;overflow:hidden;max-height:236px;overflow-y:auto">'+res.slice(0,30).map(function(c){var i=S.customers.indexOf(c);return '<div class="li" style="padding:9px 11px;cursor:pointer;border-bottom:1px solid var(--line2)" onclick="pickPreCustomer('+i+')"><div class="ic" style="background:var(--blue-l)"><i class="ti ti-user" style="color:var(--blue)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13.5px">'+c.name+'</div><div class="muted tiny">'+(c.phone||'—')+(c.addr?' · '+c.addr:'')+'</div></div><i class="ti ti-chevron-right" style="color:var(--ink3)"></i></div>';}).join('')+'</div>';}
function setPreMode(m){syncPreDraft();S.preDraft.mode=m;render('dattruoc_new');}
function pickPreCustomer(i){syncPreDraft();var c=S.customers[i];S.preDraft.customer={name:c.name,phone:c.phone||'',addr:c.addr||''};if(c.addr)S.preDraft.mode='giao';S.preSearch='';render('dattruoc_new');toast('Đã chọn '+c.name);}
function last4(p){p=(p||'').replace(/\D/g,'');return p.length>=4?p.slice(-4):p;}
function findSavedCustomer(){var cu=S.preDraft&&S.preDraft.customer;if(!cu)return null;return S.customers.find(function(x){return (cu.phone&&x.phone==cu.phone)||(cu.name&&x.name==cu.name);})||null;}
function orderItemsPreview(items){var ks=Object.keys(items||{}).filter(function(k){return String(k).indexOf('T:')!==0;});var names=ks.slice(0,3).map(function(k){var m=resolveLine(k);return (m?m.name:'Món')+'×'+items[k];});return names.join(', ')+(ks.length>3?' …':'');}

}

function preGoItems(){syncPreDraft();if(!S.preDraft.customer)S.preDraft.customer={name:'Khách',phone:'',addr:''};S.preEditId=null;S.preActive=true;S.activeTable='';S.cart={};go('banhang');}
function savePre(){
  if(cartCount()===0){toast('Chưa chọn món');return;}
  var o={items:Object.assign({},S.cart),total:cartTotal(),customer:S.preDraft.customer,time:S.preDraft.time,mode:S.preDraft.mode,note:S.preDraft.note||'',t:Date.now()};
  var cu=S.preDraft.customer;
  if(cu&&cu.name&&cu.name!='Khách'){var ex=S.customers.find(function(x){return (cu.phone&&x.phone==cu.phone)||x.name==cu.name;});if(!ex)S.customers.unshift({name:cu.name,phone:cu.phone||'',addr:cu.addr||'',note:''});}
  if(cu&&S.preEditId==null){var sc=S.customers.find(function(x){return (cu.phone&&x.phone==cu.phone)||x.name==cu.name;});if(sc){if(!sc.orders)sc.orders=[];sc.orders.unshift({items:Object.assign({},S.cart),total:cartTotal(),time:S.preDraft.time||''});}}

}

function dateToday(){return new Date().toISOString().slice(0,10);}
function inRange(from,to){var t=dateToday();if(from&&t<from)return false;if(to&&t>to)return false;return true;}
function feeActive(){if(!proOK())return false;var f=S.serviceFee;if(!f.on||!(f.pct>0))return false;if(f.mode==='manual')return !!S._orderFeeOn;return inRange(f.from,f.to);}
function feeAmt(sub){return feeActive()?Math.round(sub*S.serviceFee.pct/100):0;}
function activePromos(){if(!proOK())return [];return S.promos.filter(function(p){return p.on&&inRange(p.from,p.to);});}
function curPromo(){if(!proOK())return null;if(!S._orderPromo)return null;return S.promos.filter(function(p){return p.id==S._orderPromo;})[0]||null;}
function promoAmt(sub){var p=curPromo();if(!p)return 0;return p.type=='pct'?Math.round(sub*p.value/100):Math.min(p.value,sub);}
function manualDiscAmt(sub){var d=S._orderDisc;if(!d||!d.val)return 0;return d.mode=='pct'?Math.round(sub*Math.min(100,d.val)/100):Math.min(d.val,sub);}
function orderDiscTotal(sub){return Math.min(sub,promoAmt(sub)+manualDiscAmt(sub));}
function orderFinalTotal(){var s=cartTotal();var d=orderDiscTotal(s);return s-d+feeAmt(s-d);}

/* ===================== BANNER CHIẾN DỊCH — 1 SLOT NGỮ CẢNH ===================== */
/* Gate: chỉ sau khi đã activate (đã bán đơn thật). Chọn ĐÚNG 1 offer phù hợp trạng thái,
   theo thứ tự ưu tiên trong S.banners (backend bật/tắt từng cái). Có thể ẩn. */
function offerCtx(b){
  if(b.id=='pro')   return S.isPro?null:{reason:b.sub,cta:b.cta};
  if(b.id=='shop')  return S.printerConnected?null:{reason:'Quán chưa có máy in — in phiếu cho bếp & khách',cta:'Xem máy in'};
  if(b.id=='momo')  return S.momoLinked?null:{reason:'Mua thiết bị, nhập hàng trước — trả vào kỳ sau',cta:'Tìm hiểu'};
  if(b.id=='report')return {reason:'Số liệu & xu hướng ngành F&B mới nhất',cta:'Đọc báo cáo'};
  return {reason:b.sub,cta:b.cta};
}
function pickHeroOffer(){
  if(!S.activated)return null;                 // chưa có giá trị → không đẩy bán (kiềm chế theo vòng đời)
  var pool=(S.banners||[]).filter(function(b){return b.on&&!(S.bannerDismiss&&S.bannerDismiss[b.id]);});
  for(var i=0;i<pool.length;i++){var c=offerCtx(pool[i]);if(c)return {b:pool[i],c:c};}
  return null;
}
function heroOfferHtml(showDismiss){
  var p=pickHeroOffer();if(!p)return '';var pick=p.b,c=p.c;var dl=offerDaysLeft(pick.hsd);
  return '<div onclick="'+pick.action+'" style="background:'+pick.bg+';color:#fff;border-radius:14px;padding:13px 14px;position:relative;overflow:hidden;cursor:pointer">'+
    (showDismiss?'<i class="ti ti-x" style="position:absolute;top:8px;right:8px;font-size:16px;opacity:.7;padding:4px;z-index:2" onclick="event.stopPropagation();dismissBanner(\''+pick.id+'\')" title="Ẩn"></i>':'')+
    '<i class="ti '+pick.icon+'" style="position:absolute;right:-10px;bottom:-14px;font-size:84px;opacity:.16"></i>'+
    '<div style="position:relative;max-width:82%"><div style="display:flex;align-items:center;gap:5px;font-size:11px;opacity:.92;font-weight:600"><i class="ti ti-gift"></i> Ưu đãi cho bạn'+(dl!=null&&dl>=0?' · còn '+dl+' ngày':'')+'</div>'+
    '<div style="font-weight:700;font-size:15px;margin-top:3px">'+pick.title+'</div>'+
    '<div style="font-size:12px;opacity:.92;margin-top:2px">'+c.reason+'</div>'+
    '<span style="display:inline-block;margin-top:10px;background:rgba(255,255,255,.2);font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px">'+c.cta+' ›</span></div></div>';
}
function contextualBanner(){return heroOfferHtml(true);}
function dismissBanner(id){if(!S.bannerDismiss)S.bannerDismiss={};S.bannerDismiss[id]=true;render('home');toast('Đã ẩn khỏi Trang chủ — xem lại ở Khác › Ưu đãi');}
function unsnoozeOffer(id){if(S.bannerDismiss)delete S.bannerDismiss[id];render('uudai');toast('Đã hiện lại ở Trang chủ');}
function offerDaysLeft(hsd){if(!hsd)return null;return Math.ceil((new Date(hsd+'T23:59:59')-new Date())/86400000);}
function fmtDate(s){var p=(s||'').split('-');return p.length==3?(p[2]+'/'+p[1]+'/'+p[0]):s;}
function offersActive(){return (S.banners||[]).filter(function(b){var d=offerDaysLeft(b.hsd);return b.on&&(d===null||d>=0);});}
SCREENS.uudai=function(){
  var list=offersActive();
  var rows=list.length?list.map(function(b){
    var dl=offerDaysLeft(b.hsd);var snoozed=S.bannerDismiss&&S.bannerDismiss[b.id];
    var hsdTxt=b.hsd?('HSD '+fmtDate(b.hsd)+(dl!=null&&dl>=0?' · còn '+dl+' ngày':'')):'Không thời hạn';
    var soon=dl!=null&&dl>=0&&dl<=10;
    return '<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'+
      '<div onclick="'+b.action+'" style="cursor:pointer;display:flex;gap:12px;align-items:center;padding:13px 14px">'+
        '<div style="width:46px;height:46px;border-radius:12px;background:'+b.bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti '+b.icon+'" style="font-size:24px;color:#fff"></i></div>'+
        '<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14.5px">'+b.title+'</div><div class="muted tiny" style="margin-top:1px">'+b.sub+'</div>'+
        '<div style="font-size:11px;color:'+(soon?'var(--danger)':'var(--ink3)')+';margin-top:4px;font-weight:600"><i class="ti ti-clock-hour-4"></i> '+hsdTxt+'</div></div>'+
        '<i class="ti ti-chevron-right" style="color:var(--ink3)"></i>'+
      '</div>'+
      (snoozed?'<div style="border-top:1px solid var(--line2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--bg)"><span class="muted tiny"><i class="ti ti-eye-off"></i> Đang ẩn ở Trang chủ</span><span style="color:var(--blue);font-weight:600;font-size:12.5px;cursor:pointer" onclick="unsnoozeOffer(\''+b.id+'\')">Hiện lại</span></div>':'')+
    '</div>';
  }).join(''):'<div class="empty" style="padding:40px"><i class="ti ti-discount-off"></i><div style="margin-top:8px">Chưa có ưu đãi nào</div><div class="tiny">Ưu đãi mới sẽ hiện ở đây</div></div>';
  return{html:'<div class="screen">'+appbar('Ưu đãi của bạn')+
    '<div class="note" style="margin:10px 12px 0">Mọi ưu đãi đang có đều ở đây — kể cả khi bạn đã ẩn khỏi Trang chủ.</div>'+
    '<div class="scroll"><div class="pad">'+rows+'</div></div>'+
  '</div>',init:function(){}};
};

function webTierKm(i,v){var n=parseInt((v||'').replace(/\D/g,''))||0;S.webShipTiers[i].km=n;render('weborder');}
function webTierFee(i,v){var n=parseInt((v||'').replace(/\D/g,''))||0;S.webShipTiers[i].fee=n;render('weborder');}
function webAddTier(){var a=S.webShipTiers,last=a[a.length-1]||{km:0,fee:0};a.push({km:last.km+3,fee:last.fee+10000});render('weborder');}
function webDelTier(i){S.webShipTiers.splice(i,1);render('weborder');}
function webMaxKm(){var m=0;(S.webShipTiers||[]).forEach(function(t){if(t.km>m)m=t.km;});return m;}
function webShipFee(km){var t=(S.webShipTiers||[]).slice().sort(function(a,b){return a.km-b.km;});for(var i=0;i<t.length;i++){if(km<=t[i].km)return t[i].fee;}return null;}  // null = ngoài vùng giao

/* G2 — Món hiển thị online: cột nhóm trái + món phải (giống Bán hàng) */
function renderWebMenuPanel(){
  var el=document.getElementById('web-menu-panel');if(!el)return;var menu=S.menu;
  var cc=document.getElementById('web-vis-count');if(cc){var hc=menu.filter(function(m){return S.webHidden&&S.webHidden[m.id];}).length;cc.textContent=webVisibleMenu().length+'/'+menu.length+' hiện'+(hc?' · '+hc+' ẩn':'');}
  var cats=[];menu.forEach(function(m){var c=monCat(m);if(cats.indexOf(c)<0)cats.push(c);});
  var cat=S.webCat||'Tất cả';if(cat!='Tất cả'&&cats.indexOf(cat)<0)cat='Tất cả';
  function monRow(m){var hid=S.webHidden&&S.webHidden[m.id];return '<div class="kv" style="border-top:1px solid var(--line2);padding:9px 0"><span style="font-size:13.5px;'+(hid?'color:var(--ink3)':'')+'">'+m.name+' <span class="muted tiny">'+money(m.price)+'</span></span><span onclick="webToggleMon('+m.id+')" style="cursor:pointer">'+webSw(!hid)+'</span></div>';}
  function grpHead(g){var gm=menu.filter(function(m){return monCat(m)==g;});var anyVis=gm.some(function(m){return !(S.webHidden&&S.webHidden[m.id]);});return '<div class="row" style="margin:4px 0 0;align-items:center"><b style="font-size:11.5px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.3px">'+g+'</b><span onclick="webToggleGroup(\''+g.replace(/'/g,"\\'")+'\')" style="cursor:pointer;display:inline-flex;align-items:center;gap:5px"><span class="muted tiny">cả nhóm</span>'+webSw(anyVis)+'</span></div>';}
  var monArea='';
  if(cat=='Tất cả'){menuGroupList().forEach(function(g){var gm=menu.filter(function(m){return monCat(m)==g;});if(!gm.length)return;monArea+=grpHead(g)+gm.map(monRow).join('');});}
  else{var gm=menu.filter(function(m){return monCat(m)==cat;});monArea=grpHead(cat)+gm.map(monRow).join('');}
  var tabs='';
  if(cats.length>1){
    var chips=['Tất cả'].concat(cats).map(function(c){var on=cat==c;return '<span class="slip '+(on?'on':'')+'" style="flex-shrink:0" onclick="S.webCat=\''+c.replace(/'/g,"\\'")+'\';renderWebMenuPanel()">'+c+'</span>';}).join('');
    var moreHint=(cats.length>=3)?'<div style="position:absolute;top:0;right:0;bottom:8px;width:34px;background:linear-gradient(90deg,rgba(255,255,255,0),#fff 70%);display:flex;align-items:center;justify-content:flex-end;pointer-events:none"><i class="ti ti-chevron-right" style="color:var(--ink2)"></i></div>':'';
    tabs='<div style="position:relative;margin-bottom:8px"><div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch">'+chips+'</div>'+moreHint+'</div>';
  }
  el.innerHTML=tabs+monArea;
}

function webSubmit(){
  var keys=Object.keys(S.webCart);if(!keys.length){toast('Chưa chọn món');return;}
  var names=[],tot=0;keys.forEach(function(k){var m=S.menu.find(function(x){return x.id==k;});if(m){names.push(m.name+' ×'+S.webCart[k]);tot+=m.price*S.webCart[k];}});
  var mode=S.webMode2||'giao';
  var fee=mode=='giao'?webShipFee(S.webDist):0;
  if(mode=='giao'&&fee===null){toast('Ngoài vùng giao — chọn Tự đến lấy');return;}
  var grand=tot+(fee||0);
  var pay=(S.webPrepay&&S.webPay2=='qr')?'ck':'cod';
  var sched=(S.webTime2&&/\d/.test(S.webTime2))?S.webTime2.replace('Hẹn ','').trim():'';
  var nm=(S.webShip&&S.webShip.name)?S.webShip.name:'Khách thử';
  var ph=(S.webShip&&S.webShip.phone)?S.webShip.phone:'0903 ***';
  S.onlineOrders=S.onlineOrders||[];
  var nid='W-0'+(313+S.onlineOrders.filter(function(o){return o.plat=='web';}).length);
  var items={};keys.forEach(function(k){items[k]=S.webCart[k];});
  S.onlineOrders.unshift({id:nid,plat:'web',items:items,name:names.join(', '),n:keys.length,total:grand,ship:fee||0,state:'cho',time:'Vừa xong',mode:mode,pay:pay,sched:sched,cust:nm+' · '+ph,custName:nm,phone:ph});
  S.webCart={};S.webSeen=true;
  toast(sched?('Đã gửi đơn hẹn '+sched+' — xem ở Đơn online'):'Đã gửi đơn — xem ở mục Đơn online');
  S.nav=['home'];render('home');
}

    '</div>'+
    (pages.length?'<div style="padding:0 16px 4px"><div style="color:rgba(255,255,255,.7);font-size:12px;margin-bottom:6px">'+pages.length+' ảnh đã thêm · menu nhiều trang thì thêm tiếp</div>'+strip+'</div>':'')+

SCREENS.menu_ai_proc=function(){
  var ph=S._aiPhase||1;var np=(S.aiPages&&S.aiPages.length)||1;
  var label=ph==1?'Đang đọc tên món & giá…':'Đang tạo ảnh minh họa cho từng món…';
  var sub=ph==1?(np>1?'Đọc '+np+' ảnh menu':'Nhận diện món từ ảnh'):'AI vẽ ảnh theo tên món';
  var dot=function(on){return '<span style="width:8px;height:8px;border-radius:50%;background:'+(on?'var(--blue)':'var(--line)')+'"></span>';};
  return{html:
  '<div class="screen" style="background:#fff;text-align:center">'+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px">'+
      '<div class="spin" style="width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite"></div>'+
      '<div style="font-weight:700;font-size:16px">'+label+'</div>'+
      '<div class="muted tiny">'+sub+'</div>'+
      '<div style="display:flex;gap:7px;align-items:center;margin-top:4px">'+dot(true)+dot(ph>=2)+'</div>'+
    '</div>'+
  '</div>',init:function(){
    if(S._aiPhase===2)return;
    S._aiPhase=1;
    S.aiDetected=[{name:'Cà phê sữa',price:25000},{name:'Cà phê đen',price:20000},{name:'Bạc xỉu',price:30000},{name:'Trà đào',price:35000},{name:'Trà tắc',price:20000},{name:'Sinh tố bơ',price:40000},{name:'Nước cam ép',price:30000}].map(function(x){x.on=true;x.cat=classifyMon(x.name);return x;});
    setTimeout(function(){S._aiPhase=2;render('menu_ai_proc');
      setTimeout(function(){S.aiDetected.forEach(function(it){it.img='background:'+aiGrad(it.name);});S._aiPhase=1;if(S.nav[S.nav.length-1]=='menu_ai_proc')S.nav.pop();go('menu_ai_review');},1300);
    },1300);
  }};};
SCREENS.menu_ai_review=function(){
  var n=S.aiDetected.filter(function(x){return x.on;}).length;
  return{html:
  '<div class="screen" style="background:#fff">'+appbar('Kiểm tra món')+
    '<div class="note" style="margin:10px 12px 0">Đã nhận diện <b>'+S.aiDetected.length+' món</b>, tự xếp nhóm &amp; <b>tạo ảnh minh họa</b> theo tên <i class="ti ti-sparkles" style="color:#E0A92E"></i>. Kiểm tra, bỏ tick món sai, sửa tên/giá nếu cần.</div>'+
    '<div class="scroll"><div class="pad" id="ai-list"></div></div>'+
    '<div class="pad" style="border-top:1px solid var(--line)"><button class="btn" id="ai-add" onclick="aiConfirm()"><i class="ti ti-check"></i> Lưu '+n+' món vào thực đơn</button>'+
      '<button class="btn ghost" style="margin-top:6px" onclick="aiRescan()"><i class="ti ti-rotate-clockwise"></i> Quét lại</button></div>'+
  '</div>',init:function(){renderAiList();}};};
function renderAiList(){
  var el=document.getElementById('ai-list');if(!el)return;
  function row(it,i){return '<div class="li"><div onclick="aiToggle('+i+')" style="width:24px;height:24px;border-radius:7px;border:2px solid '+(it.on?'var(--blue)':'var(--line)')+';background:'+(it.on?'var(--blue)':'#fff')+';display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">'+(it.on?'<i class="ti ti-check" style="color:#fff;font-size:15px"></i>':'')+'</div>'+
    aiMonThumb(it,40)+
    '<div style="flex:1;margin-left:9px"><input value="'+it.name+'" onchange="S.aiDetected['+i+'].name=this.value" style="border:none;font-weight:600;font-size:14px;width:100%;background:transparent"></div>'+
    '<input value="'+it.price+'" onchange="S.aiDetected['+i+'].price=parseInt(this.value.replace(/\\D/g,\'\'))||0" inputmode="numeric" style="width:78px;border:1px solid var(--line);border-radius:8px;padding:5px;text-align:right;font-size:13px"></div>';}
  var cats=[];S.aiDetected.forEach(function(it){if(cats.indexOf(it.cat)<0)cats.push(it.cat);});
  var html='';
  cats.forEach(function(c){
    html+='<div class="muted tiny" style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:14px 0 2px">'+c+' <i class="ti ti-pencil" style="font-size:13px;cursor:pointer;text-transform:none" onclick="renameAiGroup(\''+c.replace(/'/g,"\\'")+'\')" title="Sửa tên nhóm"></i></div>';
    S.aiDetected.forEach(function(it,i){if(it.cat==c)html+=row(it,i);});
  });
  el.innerHTML=html;
}
function aiToggle(i){S.aiDetected[i].on=!S.aiDetected[i].on;renderAiList();var n=S.aiDetected.filter(function(x){return x.on;}).length;var b=document.getElementById('ai-add');if(b)b.textContent='Thêm '+n+' món vào thực đơn';}
function renameAiGroup(old){openTextSheet('Sửa tên nhóm','Tên nhóm',old,function(nn){
  if(!nn){toast('Nhập tên nhóm');return;}
  if(nn!=old)S.aiDetected.forEach(function(it){if(it.cat==old)it.cat=nn;});
  closeTextSheet();renderAiList();toast('Đã đổi tên nhóm');
});}
function aiConfirm(){
  var add=S.aiDetected.filter(function(x){return x.on&&x.name.trim();});
  if(!add.length){toast('Chọn ít nhất 1 món');return;}
  // Scan AI = tạo thực đơn mới từ ảnh: xóa sạch món + nhóm MẪU cũ, dựng lại nhóm đúng từ kết quả, dọn đơn thử
  S.menu=S.menu.filter(function(m){return !m.sample;}).concat(add.map(function(x){
    return {id:Date.now()+Math.floor(Math.random()*1000),name:x.name,price:x.price,cat:(x.cat||classifyMon(x.name)),img:x.img,unit:'món',sample:false};}));
  var gs=[];S.menu.forEach(function(m){var c=monCat(m);if(c&&gs.indexOf(c)<0)gs.push(c);});  // nhóm chỉ từ menu thực tế → hết nhóm mẫu mồ côi
  S.menuGroups=gs;
  if(!S.activated){S.cart={};S.slips=[];S.slipSeq=0;S.demoSoldOnce=false;S.demoRevenue=0;S.demoCount=0;}  // dọn món/đơn thử khi chưa bán thật
  S.nav=['home','menu'];render('menu');toast('Đã tạo thực đơn '+add.length+' món · '+gs.length+' nhóm — đã dọn menu mẫu');
}

function saveKhach(i){
  var name=document.getElementById('kh-name').value.trim();if(!name){toast('Nhập tên khách');return;}
  var c={name:name,phone:document.getElementById('kh-phone').value.trim()||'—',addr:document.getElementById('kh-addr').value.trim(),note:document.getElementById('kh-note').value.trim()};
  if(typeof i==='number'&&i>=0){S.customers[i]=c;document.getElementById('kh-dia').remove();render('khachhang');toast('Đã cập nhật khách');return;}
  S.customers.unshift(c);document.getElementById('kh-dia').remove();
  if(S._khachCb){var cb=S._khachCb;S._khachCb=null;cb(c);}else render('khachhang');

    btStep('ti-file-text','Lấy số IP từ máy','Tắt máy. Giữ nút giấy (nút to cạnh khe ra giấy) rồi bật lên, giữ ~3 giây tới khi máy nhả 1 tờ. Trên tờ đó tìm dòng IP dạng 192.168.1.xx')+

    '<div class="card" style="margin-top:10px;background:var(--bg)"><div class="row"><div style="display:flex;gap:10px;align-items:center"><div class="ic"><i class="ti ti-brand-zalo" style="color:#0068FF"></i></div><div><div style="font-weight:600;font-size:13px">Khó quá? Để iPOS làm hộ</div><div class="tiny muted">Nhắn Zalo, kỹ thuật hỗ trợ kết nối từ xa</div></div></div></div></div>'+

function connectLanPrinter(){
  var ip=(document.getElementById('lan-ip').value||'').trim();
  if(!/^\d{1,3}(\.\d{1,3}){3}$/.test(ip)){toast('Nhập IP hợp lệ (VD 192.168.1.100)');return;}
  document.getElementById('lan-dia').remove();
  var dia=document.createElement('div');dia.className='dia center';dia.style.display='flex';dia.id='pc-dia';
  dia.innerHTML='<div class="modal" style="text-align:center"><div class="spin" style="width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;margin:0 auto;animation:spin 1s linear infinite"></div><div style="font-weight:700;margin-top:12px">Đang kết nối '+ip+'…</div></div>';
  ROOT.appendChild(dia);
  setTimeout(function(){S.printerConnected=true;S.printerName='Máy in LAN';S.printerConn='LAN · '+ip;S.printerSize='80';S.printerSizeOK=true;var d=document.getElementById('pc-dia');if(d)d.remove();render('maytin');toast('Đã kết nối máy in LAN');},1300);
}
function btScan(){S.btState='scanning';render('maytin');setTimeout(function(){if(S.btState=='scanning'){S.btState='found';render('maytin');}},1400);}
function connectPrinter(name){
  var dia=document.createElement('div');dia.className='dia center';dia.style.display='flex';dia.id='pc-dia';
  dia.innerHTML='<div class="modal" style="text-align:center"><div class="spin" style="width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;margin:0 auto;animation:spin 1s linear infinite"></div><div style="font-weight:700;margin-top:12px">Đang kết nối '+name+'…</div></div>';
  ROOT.appendChild(dia);

}
/* ===== Xem trước mẫu phiếu in: Tính tiền / Pha chế / Tem nhãn × khổ k58/k80 ===== */
var PP_L='<div style="border-top:1px dashed #000;margin:5px 0"></div>';
function ppRow(l,r,bold){return '<div style="display:flex;justify-content:space-between'+(bold?';font-weight:700':'')+'"><span>'+l+'</span><span style="white-space:nowrap">'+r+'</span></div>';}
/* B3 — 3 mẫu bố cục hóa đơn: gon (tối giản) · full (đầy đủ) · brand (thương hiệu) */
function ppReceipt(size){
  var big=size=='80';var tpl=S.receiptTpl||'full';
  var w=(S.storeName||'Quán của tôi').toUpperCase();
  var addr=S.storeAddr||('123 Đường ABC, Phường X, '+(S.storeProvince||'TP.HCM'));
  var phone=S.phone||'0909 123 456';
  var initials=(S.storeName||'Quán').trim().split(/\s+/).map(function(x){return x[0];}).join('').slice(0,2).toUpperCase();
  // ----- HEAD theo mẫu -----
  var head;
  if(tpl=='brand'){
    head='<div style="text-align:center">'+
      '<div style="width:'+(big?'44px':'36px')+';height:'+(big?'44px':'36px')+';margin:0 auto 4px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:'+(big?'16px':'13px')+'">'+initials+'</div>'+
      '<div style="font-weight:800;font-size:'+(big?'17px':'14px')+';letter-spacing:.4px">'+w+'</div>'+
      '<div style="font-size:'+(big?'10px':'9px')+';font-style:italic;opacity:.8">Cảm ơn bạn đã ghé quán</div>'+
      '<div style="font-size:'+(big?'10px':'9px')+'">'+addr+'</div>'+
      '<div style="font-size:'+(big?'10px':'9px')+'">ĐT: '+phone+'</div></div>';
  }else if(tpl=='gon'){
    head='<div style="text-align:center"><div style="font-weight:800;font-size:'+(big?'15px':'13px')+';letter-spacing:.3px">'+w+'</div>'+
      '<div style="font-size:'+(big?'10px':'9px')+'">ĐT: '+phone+'</div></div>';
  }else{ // full
    head='<div style="text-align:center"><div style="font-weight:800;font-size:'+(big?'15px':'13px')+';letter-spacing:.3px">'+w+'</div>'+
      (big?'<div style="font-size:10px">'+addr+'</div>':'')+
      '<div style="font-size:'+(big?'10px':'9px')+'">ĐT: '+phone+'</div></div>';
  }
  // ----- TITLE -----
  var title='<div style="text-align:center;font-weight:700;margin:5px 0;font-size:'+(big?'13px':'12px')+'">HÓA ĐƠN THANH TOÁN</div>';
  // ----- META -----
  var meta;
  if(tpl=='gon'){meta=ppRow('#1024','18/06 18:24');}
  else if(big){meta=ppRow('Số HĐ: #1024','18/06/2026 18:24')+ppRow('Bàn: Bàn 2 · Tại chỗ','')+ppRow('Thu ngân: Chủ quán','');}
  else{meta=ppRow('#1024','18/06 18:24')+'<div>Bàn 2 · Tại chỗ</div>';}
  // ----- ITEMS (gọn: không hiện ghi chú từng món) -----
  var showNote=tpl!='gon';var items;
  if(big){
    var r=function(n,sl,amt,note){return '<div style="display:flex"><span style="flex:1">'+n+'</span><span style="width:26px;text-align:center">'+sl+'</span><span style="width:62px;text-align:right">'+amt+'</span></div>'+((note&&showNote)?'<div style="font-size:9px;opacity:.7;padding-left:4px">('+note+')</div>':'');};
    items='<div style="display:flex;font-weight:700;font-size:10px"><span style="flex:1">Món</span><span style="width:26px;text-align:center">SL</span><span style="width:62px;text-align:right">T.Tiền</span></div>'+
      r('Cà phê sữa','2','50.000','100% đường, 70% đá')+r('Trà đào','1','35.000','')+r('Bánh mì thịt','1','20.000','');
  }else{
    var r2=function(n,sl,amt,note){return '<div>'+n+'</div>'+((note&&showNote)?'<div style="font-size:8.5px;opacity:.7">('+note+')</div>':'')+'<div style="display:flex;justify-content:space-between"><span>x'+sl+'</span><span>'+amt+'</span></div>';};
    items=r2('Cà phê sữa','2','50.000','100%đ · 70%đá')+r2('Trà đào','1','35.000','')+r2('Bánh mì thịt','1','20.000','');
  }
  // ----- TỔNG (gọn: chỉ tổng cộng) -----
  var totals=(tpl=='gon')?'':(ppRow('Tạm tính','105.000')+ppRow('Giảm giá (10%)','-10.500')+ppRow('Phụ phí (5%)','+4.725'));
  var grand='<div style="display:flex;justify-content:space-between;font-weight:800;font-size:'+(big?'14px':'12.5px')+'"><span>TỔNG CỘNG</span><span>99.225đ</span></div>';
  // ----- THANH TOÁN (gọn: 1 dòng ngắn) -----
  var pay;
  if(tpl=='gon'){pay='<div>Tiền mặt · '+ '99.225đ</div>';}
  else if(big){pay=ppRow('Tiền khách đưa','100.000')+ppRow('Tiền thối lại','775')+ppRow('Thanh toán','Tiền mặt');}
  else{pay='<div>Tiền mặt · đưa 100.000 · thối 775</div>';}
  // ----- QR là TOGGLE độc lập (off / static / dynamic), không gắn theo mẫu -----
  var qrMode=S.receiptQR||'off';
  var qrImg='<div style="width:'+(big?'66px':'52px')+';height:'+(big?'66px':'52px')+';margin:4px auto;border:1px solid #000;display:flex;align-items:center;justify-content:center;font-size:8px">[ QR ]</div>';
  var qrBlock='';
  if(qrMode!='off'){
    var qrCap=qrMode=='dynamic'?'Quét để thanh toán 99.225đ':'Quét chuyển khoản (mã quán)';
    qrBlock='<div style="text-align:center;margin-top:6px">'+qrImg+'<div style="font-size:'+(big?'9px':'8.5px')+';opacity:.75">'+qrCap+'</div></div>';
  }
  // ----- FOOT: cảm ơn (theo mẫu) + dòng branding cố định ở đáy MỌI mẫu -----
  var thanks=(tpl=='brand')?'HẸN GẶP LẠI ❤':'Cảm ơn &amp; hẹn gặp lại!';
  var brandSub=(tpl=='brand')?'<div style="text-align:center;font-size:'+(big?'9px':'8.5px')+';opacity:.75">Theo dõi quán để nhận ưu đãi</div>':'';
  var foot='<div style="text-align:center;margin-top:7px;font-weight:700;font-size:'+(big?'11px':'10px')+'">'+thanks+'</div>'+brandSub+
    '<div style="text-align:center;font-size:'+(big?'9px':'8.5px')+';opacity:.7;margin-top:5px">FABiBox power by iPOS.vn</div>';
  return head+PP_L+title+meta+PP_L+items+PP_L+totals+grand+PP_L+pay+qrBlock+foot;
}
function ppKitchen(size){
  var big=size=='80';
  function r(n,sl,note){return '<div style="font-weight:700;font-size:'+(big?'14px':'12.5px')+';margin-top:3px">'+sl+'×  '+n+'</div>'+(note?'<div style="font-size:'+(big?'11px':'10px')+';padding-left:14px">→ '+note+'</div>':'');}
  return '<div style="text-align:center;font-weight:800;font-size:'+(big?'15px':'13px')+'">PHIẾU PHA CHẾ</div>'+
    PP_L+ppRow('Bàn 2 · Tại chỗ','18:24')+ppRow('Số HĐ: #1024','')+PP_L+
    r('Cà phê sữa','2','100% đường, 70% đá')+r('Trà đào','1','')+r('Bánh mì thịt','1','ít cay')+
    PP_L+'<div style="text-align:center;font-size:9px">Giờ vào bếp: 18:24</div>';
}
/* A8 — khổ tem decal phổ biến F&B Việt Nam (research) + nội dung in linh hoạt */
var TEM_SIZES=[
  {v:'50x30',t:'50 × 30 mm',d:'Phổ biến nhất cho trà sữa/cà phê — đủ tên món + tùy chọn',rec:true},
  {v:'40x30',t:'40 × 30 mm',d:'Cốc nhỏ, ít chữ — tiết kiệm decal',rec:false},
  {v:'35x22',t:'35 × 22 mm',d:'Tem nhỏ (2 con/hàng) — chỉ tên món + 1 dòng',rec:false},
  {v:'60x40',t:'60 × 40 mm',d:'Tem to — quán nhiều topping, in được nhiều dòng',rec:false}
];
function temSizeMeta(v){v=v||S.temSize||'50x30';var p=v.split('x');var w=+p[0],h=+p[1];var sc=3.3;
  return {v:v,w:Math.round(w*sc),h:Math.round(h*sc),fsName:w>=50?13:w>=40?12:11,fs:w>=45?10:9};}
function temFieldsOn(){return S.temFields||{opts:true,table:true,time:true,order:true,store:true};}
function ppLabel(){
  var f=temFieldsOn(),m=temSizeMeta();
  var h='<div style="font-weight:800;font-size:'+m.fsName+'px;line-height:1.15">Cà phê sữa</div>';
  if(f.opts)h+='<div style="font-size:'+m.fs+'px;margin-top:1px">100% đường · 70% đá</div>';
  var foot=[];if(f.table)foot.push('Bàn 2');if(f.time)foot.push('18:24');
  if(foot.length)h+='<div style="display:flex;justify-content:space-between;font-size:'+m.fs+'px;margin-top:3px"><span>'+foot[0]+'</span><span>'+(foot[1]||'')+'</span></div>';
  var ln2=[];if(f.order)ln2.push('#1024');if(f.store)ln2.push((S.storeName||'Quán').slice(0,14));
  if(ln2.length)h+='<div style="font-size:'+m.fs+'px">'+ln2.join(' · ')+'</div>';
  return h;
}
function openTemConfig(){
  mkSheet('temcfg-dia','<div style="font-size:17px;font-weight:700;margin-bottom:2px">Khổ tem & nội dung in</div><div class="muted tiny" style="margin-bottom:12px">Chọn khổ decal đang dùng và thông tin in lên tem dán cốc.</div><div id="temcfg-body"></div><button class="btn" style="margin-top:12px" onclick="rmSheet(\'temcfg-dia\');render(\'maytin\');toast(\'Đã lưu mẫu tem khổ \'+(S.temSize||\'50x30\').replace(\'x\',\'×\'))">Xong</button>');
  renderTemConfig();
}
function setTemSize(v){S.temSize=v;renderTemConfig();}
function toggleTemField(k){var f=Object.assign({},temFieldsOn());f[k]=!(f[k]!==false);S.temFields=f;renderTemConfig();}
function renderTemConfig(){
  var el=document.getElementById('temcfg-body');if(!el)return;
  var cur=S.temSize||'50x30',f=temFieldsOn(),m=temSizeMeta(cur);
  var sizes=TEM_SIZES.map(function(s){var on=s.v==cur;return '<div onclick="setTemSize(\''+s.v+'\')" style="cursor:pointer;border:1.5px solid '+(on?'var(--blue)':'var(--line)')+';border-radius:12px;padding:10px 12px;margin-bottom:8px;background:'+(on?'var(--blue-l)':'#fff')+'"><div class="row"><div style="font-weight:700;font-size:14px;color:'+(on?'var(--blue)':'var(--ink)')+'">'+s.t+(s.rec?' <span class="pill" style="background:var(--ok-l);color:var(--ok);font-size:9px">Khuyên dùng</span>':'')+'</div>'+(on?'<i class="ti ti-check" style="color:var(--blue)"></i>':'')+'</div><div class="muted tiny" style="margin-top:2px">'+s.d+'</div></div>';}).join('');
  var fieldRows=[['opts','Tùy chọn (đường · đá · topping)'],['table','Bàn / Mang đi'],['time','Giờ lên đơn'],['order','Số đơn'],['store','Tên quán']].map(function(r){var on=f[r[0]]!==false;return '<div class="li" style="border-bottom:none;padding:7px 0;cursor:pointer" onclick="toggleTemField(\''+r[0]+'\')"><div style="flex:1;font-size:13.5px">'+r[1]+'</div><div style="width:42px;height:24px;border-radius:14px;background:'+(on?'var(--blue)':'var(--line)')+';position:relative;flex-shrink:0"><div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;'+(on?'right:3px':'left:3px')+'"></div></div></div>';}).join('');
  var preview='<div style="display:flex;justify-content:center;margin:6px 0 4px"><div style="width:'+m.w+'px;height:'+m.h+'px;background:#fff;border:1px solid var(--line2);box-shadow:0 2px 10px rgba(0,0,0,.14);padding:8px 9px;font-family:\'Courier New\',ui-monospace,monospace;color:#000;text-align:left;line-height:1.4;overflow:hidden">'+ppLabel()+'</div></div><div class="muted tiny" style="text-align:center;margin-bottom:10px">Mẫu mô phỏng khổ '+cur.replace('x',' × ')+' mm</div>';
  el.innerHTML='<div style="font-weight:700;font-size:13px;margin-bottom:8px">Khổ decal</div>'+sizes+preview+'<div style="font-weight:700;font-size:13px;margin:6px 0 4px">Nội dung in trên tem</div><div class="muted tiny" style="margin-bottom:4px">Tên món luôn được in. Bật/tắt các dòng còn lại:</div>'+fieldRows;
}
function ppSeg(v,lb,cur){return '<div class="o '+(cur==v?'on':'')+'" onclick="S._ppType=\''+v+'\';renderPrintPreview()">'+lb+'</div>';}
function ppSizeChip(v,cur){return '<span class="csel '+(cur==v?'on':'')+'" onclick="S._ppSize=\''+v+'\';renderPrintPreview()">Khổ k'+v+'</span>';}
function renderPrintPreview(){
  var el=document.getElementById('pp-body');if(!el)return;
  var type=S._ppType||'receipt';if(type=='label')type='receipt';
  var locked=S.printerConnected&&S.printerSizeOK;
  var size=locked?(S.printerSize||'80'):(S._ppSize||'80');
  var kLabel=isFoodInd()?'Phiếu bếp':'Phiếu pha chế';
  var typeSeg='<div class="seg" style="margin-bottom:12px">'+ppSeg('receipt','Hóa đơn',type)+ppSeg('kitchen',kLabel,type)+'</div>';
  var is58=size=='58';
  if(type=='receipt'&&is58&&(S.receiptTpl||'full')=='brand')S.receiptTpl='full';   // Thương hiệu chỉ ở K80
  // 1. Khổ giấy
  var sizeSeg=locked?'':('<div class="muted tiny" style="text-align:center;margin-bottom:5px">1. Khổ giấy</div><div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px">'+ppSizeChip('58',size)+ppSizeChip('80',size)+'</div>');
  // 2. Mẫu (lọc theo khổ: K58 = 2 mẫu · K80 = 3 mẫu)
  var tplSeg=(type=='receipt')?('<div class="muted tiny" style="text-align:center;margin-bottom:5px">2. Mẫu hóa đơn</div><div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px">'+ppTplChip('gon','Tối giản')+ppTplChip('full','Đầy đủ')+(is58?'':ppTplChip('brand','Thương hiệu'))+'</div>'):'';
  // 3. QR toggle (độc lập với mẫu)
  var qrSeg=(type=='receipt')?('<div class="muted tiny" style="text-align:center;margin-bottom:5px">3. Mã QR trên hóa đơn</div><div style="display:flex;gap:6px;justify-content:center;margin-bottom:14px">'+ppQrChip('off','Tắt')+ppQrChip('static','QR mã quán')+ppQrChip('dynamic','QR theo đơn')+'</div>'):'';
  var content=type=='kitchen'?ppKitchen(size):ppReceipt(size);
  var paperW=size=='80'?'280px':'200px';
  var fs=size=='80'?'11.5px':'10.5px';
  var paper='<div style="width:'+paperW+';max-width:100%;margin:0 auto;background:#fff;border:1px solid var(--line2);box-shadow:0 2px 10px rgba(0,0,0,.14);padding:14px 12px;font-family:\'Courier New\',ui-monospace,monospace;font-size:'+fs+';color:#000;text-align:left;line-height:1.5">'+content+'</div>';
  var tplNote=(type=='receipt')?{gon:'Tối giản — tên quán, món, tổng & cảm ơn. Hợp quán bán nhanh.',full:'Đầy đủ — địa chỉ, chi tiết tiền. Mẫu chuẩn (mặc định).',brand:'Thương hiệu — logo, khẩu hiệu nổi bật (chỉ K80).'}[S.receiptTpl||'full']:'';
  var note='<div class="muted tiny" style="text-align:center;margin-top:10px;line-height:1.5">'+(tplNote?tplNote+'<br>':'')+'Khổ '+(size=='80'?'<b>K80 (80mm)</b> — rộng, đủ cột':'<b>K58 (58mm)</b> — gọn, ít cột')+'</div>';
  el.innerHTML=typeSeg+sizeSeg+tplSeg+qrSeg+paper+note;
}
function ppTplChip(v,label){var on=(S.receiptTpl||'full')==v;return '<span class="csel '+(on?'on':'')+'" onclick="S.receiptTpl=\''+v+'\';renderPrintPreview()">'+label+'</span>';}
function ppQrChip(v,label){var on=(S.receiptQR||'off')==v;return '<span class="csel '+(on?'on':'')+'" onclick="S.receiptQR=\''+v+'\';renderPrintPreview()">'+label+'</span>';}
function showPrintPreview(type){

      '<div style="padding:6px 12px 3px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--gold);background:#FAFBFC">Chỉ có ở Pro</div>'+rowsP+
    '</div>'+
    '<button class="btn sec" style="margin-top:12px" onclick="goiSetTab(\'gia\')">Xem giá gói</button>';
}
function goiPlanCard(p,sel){
  var on=sel==p.id;
  var price=p.orig?('<span style="font-size:10.5px;color:var(--ink3);text-decoration:line-through">'+money(p.orig)+'</span> <b style="color:var(--danger)">'+money(p.price)+'</b>'):'<b>'+money(p.price)+'</b>';
  return '<div onclick="goiSetPlan(\''+p.id+'\')" style="position:relative;border:'+(on?'2px solid var(--gold)':'1px solid var(--line)')+';border-radius:12px;padding:12px;display:flex;align-items:center;gap:11px;margin-bottom:11px;cursor:pointer;background:'+(on?'#FFFDF8':'#fff')+'">'+
    (p.best?'<span style="position:absolute;top:-9px;left:12px;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">Tốt nhất · −'+p.save+'%</span>':'')+
    (p.id=='life'?'<span style="position:absolute;top:-9px;left:12px;background:var(--ink);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px">Mua đứt · còn 12 suất</span>':'')+
    '<span style="width:18px;height:18px;border-radius:50%;border:1.5px solid '+(on?'var(--gold)':'var(--line)')+';flex-shrink:0;display:flex;align-items:center;justify-content:center">'+(on?'<span style="width:9px;height:9px;border-radius:50%;background:var(--gold)"></span>':'')+'</span>'+
    '<div style="flex:1"><div style="font-size:14px;font-weight:600">'+p.name+'</div><div class="muted tiny">'+p.sub+'</div></div>'+
    '<div style="text-align:right">'+price+'<div class="muted tiny">'+p.unit+'</div></div></div>';
}
function goiPlansView(sel){var P=goiPlans();return goiPlanCard(P.thang,sel)+goiPlanCard(P.nam,sel)+goiPlanCard(P.life,sel);}
SCREENS.goi=function(){
  var isPro=S.isPro, trial=S.trialActive&&!S.isPro, expired=!S.isPro&&!S.trialActive;
  var tab=S.goiTab||'ss';var plan=S.goiPlan||'nam';var sel=goiPlans()[plan];
  var demo='<div style="background:#fff;border:1px dashed var(--line);border-radius:10px;padding:8px 10px;margin-bottom:12px"><div class="muted tiny" style="margin-bottom:6px"><i class="ti ti-tool"></i> Xem thử trạng thái (demo · dev)</div><div class="seg" style="margin:0 0 8px"><div class="o '+(trial?'on':'')+'" onclick="setAcctState(\'trial\')">Dùng thử</div><div class="o '+(expired?'on':'')+'" onclick="setAcctState(\'expired\')">Hết hạn</div><div class="o '+(isPro?'on':'')+'" onclick="setAcctState(\'pro\')">Pro</div></div><div onclick="deviceConflictDialog()" class="tiny" style="cursor:pointer;color:var(--blue)"><i class="ti ti-devices"></i> Demo: đăng nhập máy thứ 2 (Free 1 thiết bị)</div></div>';
  var hero;
  if(trial)hero='<div class="card" style="background:var(--gold-l);border:1px solid #ecd9a8;padding:12px 14px"><div style="font-size:23px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums" id="trial-clock">'+fmtCountdown(trialMsLeft())+'</div><div style="font-size:12px;color:#7a6020;margin-top:5px;line-height:1.45">Bạn đang dùng bản Pro đầy đủ tính năng · Sau đó chuyển sang bản Free.</div></div>';
  else if(expired)hero='<div class="card" style="padding:11px 13px;display:flex;align-items:center;gap:9px"><i class="ti ti-lock" style="color:var(--ink3);font-size:19px;flex-shrink:0"></i><div style="font-size:12.5px;color:var(--ink2);line-height:1.4">Pro đã khóa — quán vẫn bán bình thường với bản Free, dữ liệu còn nguyên.</div></div>';
  else hero='<div class="card" style="background:var(--ok-l);border:1px solid #bfe6cb;padding:11px 13px;display:flex;align-items:center;gap:9px"><i class="ti ti-circle-check" style="color:var(--ok);font-size:19px;flex-shrink:0"></i><div style="font-size:12.5px;color:#15803d;line-height:1.4">Đang dùng Pro · hạn đến '+proExpiryStr()+'.</div></div>';
  var body=(tab=='ss')?goiCompareView():goiPlansView(plan);
  var ctaLabel=isPro?(plan=='life'?'Nâng lên Trọn đời':'Gia hạn'):(trial?'Nâng cấp Pro':'Mở khóa Pro');
  var footer=(tab=='gia')?'<div class="pad" style="border-top:1px solid var(--line)"><button class="btn" style="background:var(--gold)" onclick="openPaySheet()"><i class="ti ti-diamond-filled"></i> '+ctaLabel+'</button></div>':'';
  return{html:'<div class="screen" style="background:var(--bg)">'+appbar('Gói Pro '+dmdG())+
    '<div class="scroll"><div class="pad" style="padding-bottom:12px">'+
      demo+hero+
      '<div style="display:flex;gap:6px;margin:12px 0">'+goiTabBtn('ss','So sánh Free/Pro',tab)+goiTabBtn('gia','Giá gói',tab)+'</div>'+
      body+
    '</div></div>'+footer+
  '</div>',init:function(){if(S.trialActive&&!S.isPro)startTrialClock();}};};
function setGoiCycle(c){S.goiCycle=c;render('goi');}
/* Thanh toán qua QR / MoMo — KHÔNG qua App Store */
/* Bù trừ khi nâng gói A→B: giá trị còn lại của gói đang trả, trừ vào gói mới */
function proCredit(targetId){
  if(!S.isPro)return 0;
  var rank={thang:1,nam:2,life:3};var cur=S.proPlan||'nam';
  if((rank[targetId]||9)<=(rank[cur]||0))return 0;          // chỉ nâng lên cao hơn
  var paid=S.proPaid||(cur=='nam'?GOI_PY:cur=='thang'?GOI_PM:GOI_LIFE);
  var totalDays=cur=='nam'?365:cur=='thang'?30:36500;
  var elapsed=Math.floor((Date.now()-(S.proStart||Date.now()))/86400000);
  var remain=Math.max(0,totalDays-elapsed);
  return Math.round(paid*remain/totalDays/1000)*1000;
}
function openPaySheet(){
  var sel=goiPlans()[S.goiPlan||'nam'];var credit=proCredit(sel.id);
  S._paySel=sel;S._payCredit=credit;S._payAmount=Math.max(0,sel.price-credit);
  openInvoiceSheet();
}
/* Bước 1 — thông tin hóa đơn (kế thừa SĐT/địa chỉ, lưu lại cho lần sau) */
function openInvoiceSheet(){
  var sel=S._paySel||goiPlans()[S.goiPlan||'nam'];var t=S.invoiceType||'cn';
  var cycle=sel.id=='thang'?'Theo tháng':sel.id=='nam'?'Theo năm':'Trọn đời · mua đứt';
  mkSheet('inv-dia','<div style="font-size:17px;font-weight:700;margin-bottom:12px">Nâng cấp Pro</div>'+
    '<div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:6px">Gói mua</div>'+
    '<div class="card" style="display:flex;align-items:center;gap:11px;border:1px solid var(--line2);margin:0 0 16px"><div class="ic" style="background:var(--gold-l)"><i class="ti ti-diamond-filled" style="color:var(--gold)"></i></div><div style="flex:1"><div style="font-weight:600;font-size:14px">'+sel.name+'</div><div class="muted tiny">'+cycle+'</div></div><b style="font-size:15px">'+money(sel.price)+'</b></div>'+
    '<div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);margin-bottom:6px">Thông tin xuất hóa đơn</div>'+
    '<div style="background:var(--bg);border-radius:9px;padding:8px 11px;display:flex;align-items:center;gap:8px;margin-bottom:10px"><i class="ti ti-history" style="color:var(--ink3)"></i><div style="flex:1;font-size:11.5px;color:var(--ink2);line-height:1.4">Kế thừa: <b>'+(S.phone||'09xx xxx xxx')+'</b> · '+(S.storeAddr||'địa chỉ quán')+'</div></div>'+
    '<div class="seg" style="margin-bottom:12px"><div class="o '+(t=='cn'?'on':'')+'" onclick="invType(\'cn\')">Cá nhân</div><div class="o '+(t=='mst'?'on':'')+'" onclick="invType(\'mst\')">Công ty (MST)</div></div>'+
    '<div id="inv-fields"></div>'+
    '<div class="muted tiny" style="margin:2px 0 12px;line-height:1.5"><i class="ti ti-lock"></i> Lưu lại cho lần nâng cấp / mua thiết bị sau — không nhập lại.</div>'+
    '<button class="btn" onclick="invContinue()">Tiếp tục thanh toán</button>'+
    '<button class="btn ghost" style="margin-top:4px" onclick="rmSheet(\'inv-dia\')">Để sau</button>');
  invFields();
}
function invType(t){S.invoiceType=t;var a=document.querySelectorAll('#inv-dia .seg .o');if(a[0])a[0].classList.toggle('on',t=='cn');if(a[1])a[1].classList.toggle('on',t=='mst');invFields();}
function invFields(){
  var el=document.getElementById('inv-fields');if(!el)return;var t=S.invoiceType||'cn';
  if(t=='mst')el.innerHTML='<div class="field"><label>Mã số thuế</label><input id="inv-mst" type="tel" inputmode="numeric" placeholder="Nhập mã số thuế" value="'+(S.invoiceMST||'')+'" oninput="invMstLookup()"></div><div id="inv-mst-info"></div>',invMstLookup();
  else el.innerHTML='<div class="field"><label>CCCD <span style="color:var(--danger)">*</span></label><input id="inv-cccd" type="tel" inputmode="numeric" placeholder="Số CCCD" value="'+(S.invoiceCCCD||'')+'"></div><div class="field"><label>Họ và tên <span style="color:var(--danger)">*</span></label><input id="inv-name" placeholder="Họ tên trên hóa đơn" value="'+(S.invoiceName||'')+'"></div><div class="field"><label>Địa chỉ <span style="color:var(--danger)">*</span></label><input id="inv-addr" placeholder="Địa chỉ trên hóa đơn" value="'+(S.invoiceAddr||'')+'"></div>';
}
function invMstLookup(){var el=document.getElementById('inv-mst-info');if(!el)return;var v=((document.getElementById('inv-mst')||{}).value||'').replace(/\D/g,'');el.innerHTML=(v.length>=10)?'<div style="background:var(--ok-l);border:1px solid #bfe6cb;border-radius:9px;padding:9px 11px"><div style="font-size:10.5px;color:#15803d;margin-bottom:3px"><i class="ti ti-circle-check"></i> Tự lấy từ cơ quan thuế</div><div style="font-size:12.5px;font-weight:600">Công ty TNHH ABC</div><div class="muted tiny">12 Lê Lợi, P. Bến Nghé, Q1, TP.HCM</div></div>':'';}
function invContinue(){
  var t=S.invoiceType||'cn';
  if(t=='mst'){var v=((document.getElementById('inv-mst')||{}).value||'').trim();if(v.replace(/\D/g,'').length<10){toast('Nhập mã số thuế');return;}S.invoiceMST=v;}
  else{var c=((document.getElementById('inv-cccd')||{}).value||'').trim(),n=((document.getElementById('inv-name')||{}).value||'').trim(),a=((document.getElementById('inv-addr')||{}).value||'').trim();if(!c||!n||!a){toast('Nhập đủ CCCD, Họ tên, Địa chỉ');return;}S.invoiceCCCD=c;S.invoiceName=n;S.invoiceAddr=a;}
  rmSheet('inv-dia');openPayMethods();
}
/* Bước 2 — chọn phương thức: MoMo / Ngân hàng / Tải QR */
function payMethodRow(ic,col,bg,title,sub,act){return '<div onclick="'+act+'" style="border:1px solid var(--line);border-radius:11px;padding:11px 12px;display:flex;align-items:center;gap:11px;margin-bottom:9px;cursor:pointer"><div class="ic" style="background:'+bg+'"><i class="ti '+ic+'" style="color:'+col+'"></i></div><div style="flex:1"><div style="font-weight:600;font-size:13.5px">'+title+'</div><div class="muted tiny">'+sub+'</div></div><i class="ti ti-chevron-right" style="color:var(--ink3)"></i></div>';}
function toggleBankList(){var el=document.getElementById('bank-list');if(!el)return;if(el.innerHTML){el.innerHTML='';return;}var banks=['Vietcombank','Techcombank','MB Bank','BIDV','ACB','VPBank'];el.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;margin:-2px 2px 9px">'+banks.map(function(b){return '<span onclick="toast(\'Demo: mở app '+b+' (đã điền sẵn số tiền)\')" style="font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:6px 11px;cursor:pointer">'+b+'</span>';}).join('')+'<span onclick="toast(\'Demo: chọn ngân hàng khác\')" style="font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:6px 11px;color:var(--blue);cursor:pointer">Khác…</span></div>';}
function openPayMethods(){
  var sel=S._paySel||goiPlans()[S.goiPlan||'nam'];var credit=S._payCredit||0;var amt=S._payAmount||sel.price;
  var amtTxt=money(amt);
  mkSheet('pay-dia','<div style="font-size:17px;font-weight:700;margin-bottom:2px">Thanh toán</div>'+
    '<div class="muted tiny" style="margin-bottom:12px">'+sel.name+' · <b style="color:var(--ink)">'+money(sel.price)+'</b></div>'+
    (credit>0?'<div style="border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:12px"><div class="kv" style="padding:8px 12px;font-size:12.5px"><span class="muted">'+sel.name+'</span><b>'+money(sel.price)+'</b></div><div class="kv" style="padding:8px 12px;font-size:12.5px;border-top:1px solid var(--line2)"><span class="muted">Trừ giá trị gói cũ còn lại</span><b style="color:var(--ok)">−'+money(credit)+'</b></div><div class="kv" style="padding:9px 12px;font-size:13.5px;border-top:1px solid var(--line2);background:var(--bg)"><span style="font-weight:700">Phải trả</span><b style="color:var(--danger)">'+amtTxt+'</b></div></div>':'')+
    payMethodRow('ti-wallet','#A50064','#FBEAF2','Ví MoMo','Mở MoMo · đã điền sẵn số tiền','toast(\'Demo: mở MoMo với số tiền '+amtTxt+'\')')+
    payMethodRow('ti-building-bank','#2563EB','#E6F0FB','Ngân hàng','Chọn bank · mở app, điền sẵn tiền','toggleBankList()')+
    '<div id="bank-list"></div>'+
    payMethodRow('ti-qrcode','#444','#F1EFE8','Tải ảnh QR','Lưu ảnh QR để quét bằng app khác','toast(\'Demo: đã tải ảnh QR về máy\')')+
    '<button class="btn" style="margin-top:6px;background:var(--gold)" onclick="rmSheet(\'pay-dia\');doUpgrade()"><i class="ti ti-circle-check"></i> Tôi đã thanh toán xong</button>'+
    '<button class="btn ghost" style="margin-top:4px" onclick="rmSheet(\'pay-dia\')">Để sau</button>'+
    '<div class="muted tiny" style="text-align:center;margin-top:9px;line-height:1.5"><i class="ti ti-shield-lock"></i> Qua MoMo / ngân hàng / QR — không qua App Store. Trả xong tự lên Pro.</div>');
}
function doUpgrade(){var sel=S._paySel||goiPlans()[S.goiPlan||'nam'];S.isPro=true;S.trialActive=false;S.proStart=Date.now();S.proPlan=sel.id;S.proPaid=sel.price;if(!S.renewMode)S.renewMode='auto';if(S._trialTimer){clearInterval(S._trialTimer);S._trialTimer=null;}rmSheet('pay-dia');S.nav=['home'];render('home');toast(sel.id=='life'?'Đã mua Trọn đời — mở khóa toàn bộ':'Đã nâng cấp Pro — mở khóa toàn bộ');
  if(!S.momoLinked)mkSheet('proshop-dia','<div style="text-align:center"><i class="ti ti-speakerphone" style="font-size:30px;color:#A50064"></i><div style="font-size:16px;font-weight:700;margin-top:6px">Gợi ý cho quán Pro</div><div class="muted tiny" style="margin:8px 14px 14px;line-height:1.5">Loa thông báo MoMo — khách trả xong loa báo ngay, tặng kèm mã QR phôi dán từng bàn.</div></div><button class="btn" style="background:#A50064" onclick="rmSheet(\'proshop-dia\');openProductGo(\'p5\')"><i class="ti ti-arrow-right"></i> Xem loa MoMo + QR phôi</button><button class="btn ghost" style="margin-top:4px" onclick="rmSheet(\'proshop-dia\')">Để sau</button>');}
/* boot */
function buildPhone(label){
  var col=document.createElement('div');col.className='col';
  var p=document.createElement('div');p.className='phone';
  p.innerHTML='<div class="notch"></div><div class="screen" id="root"></div>';
  var cap=document.createElement('div');cap.className='lbl';cap.textContent=label;
  var rs=document.createElement('button');rs.className='btn sm gray';rs.innerHTML='⟲ Reset về Splash';rs.style.marginTop='2px';
  rs.onclick=function(){reset();S.nav=['splash'];render('splash');};
  col.appendChild(p);col.appendChild(rs);
  document.getElementById('wrap').appendChild(col);
  return p.querySelector('#root');
}
ROOT=buildPhone('FABiBox Mobile');
S.nav=['splash'];render('splash');
</script>
