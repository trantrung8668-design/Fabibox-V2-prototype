<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FABiBox — Prototype</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
:root{
  --blue:#2563EB; --blue-d:#1D4ED8; --blue-l:#EFF5FF;
  --ink:#111827; --ink2:#4B5563; --ink3:#9CA3AF;
  --bg:#F3F4F6; --card:#FFFFFF; --line:#E5E7EB; --line2:#F0F1F3;
  --ok:#16A34A; --ok-l:#ECFDF3; --warn:#B45309; --warn-l:#FEF6E7;
  --danger:#DC2626; --gold:#B7791F; --gold-l:#FBF3E2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#0B1220;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px 10px 60px;min-height:100vh;}
.wrap{display:flex;flex-wrap:wrap;gap:26px;justify-content:center;align-items:flex-start;}
.col{display:flex;flex-direction:column;align-items:center;gap:10px;}
.lbl{color:#cbd5e1;font-size:12px;font-weight:600;letter-spacing:.02em;}
.hint{color:#94a3b8;font-size:11px;max-width:330px;text-align:center;line-height:1.5;}

/* phone frame */
.phone{width:360px;height:740px;background:var(--card);border-radius:34px;border:11px solid #000;
  position:relative;overflow:hidden;box-shadow:0 22px 60px rgba(0,0,0,.45);}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:50;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);}
.statusbar{height:34px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;padding:0 22px 3px;font-size:12px;font-weight:600;color:var(--ink);background:transparent;}
.statusbar .r{display:flex;gap:5px;align-items:center;}

/* generic */
.scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}
.pad{padding:16px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;
  background:var(--blue);color:#fff;font-size:16px;font-weight:600;padding:15px;cursor:pointer;font-family:inherit;}
.btn:active{background:var(--blue-d);}
.btn.sec{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
.btn.ghost{background:transparent;color:var(--ink2);font-weight:500;}
.btn.gray{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
.btn.sm{padding:10px 14px;font-size:14px;width:auto;border-radius:11px;}
.btn:disabled{opacity:.45;}
.appbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:30px 14px 10px;background:#fff;border-bottom:1px solid var(--line);}
.appbar .ti{font-size:22px;color:var(--ink);cursor:pointer;}
.appbar h1{font-size:17px;font-weight:600;margin:0;flex:1;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px;font-size:16px;font-family:inherit;background:#fff;}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);}
.opt{font-size:12px;color:var(--ink3);font-weight:500;}
.card{background:#fff;border-radius:16px;padding:15px;}
.muted{color:var(--ink2);}
.tiny{font-size:11px;}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.pill.ok{background:var(--ok-l);color:var(--ok);}
.pill.pro{background:var(--gold-l);color:var(--gold);}
.pill.demo{background:var(--warn-l);color:var(--warn);}
.dia{position:absolute;inset:0;background:rgba(15,23,42,.5);z-index:80;display:none;align-items:flex-end;}
.dia.center{align-items:center;justify-content:center;}
.sheet{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:18px 16px 30px;max-height:88%;overflow:auto;animation:up .25s ease;}
.pad[style*="border-top:1px solid var(--line)"],#bh-bar,#bt-bar{padding-bottom:30px !important;}
.modal{width:84%;background:#fff;border-radius:20px;padding:20px;animation:pop .2s ease;}
@keyframes up{from{transform:translateY(40px);opacity:.4;}to{transform:none;opacity:1;}}
@keyframes pop{from{transform:scale(.92);opacity:0;}to{transform:none;opacity:1;}}
.grab{width:38px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 14px;}
.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);background:#111827;color:#fff;font-size:13px;padding:10px 16px;border-radius:12px;z-index:120;opacity:0;transition:.2s;pointer-events:none;max-width:80%;text-align:center;}
.toast.show{opacity:1;bottom:104px;}

/* tab bar */
.tabbar{flex-shrink:0;height:62px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding-bottom:4px;}
.tab{text-align:center;cursor:pointer;color:var(--ink3);}
.tab .ti{font-size:21px;}
.tab span{display:block;font-size:9.5px;margin-top:1px;white-space:nowrap;}
.tab.on{color:var(--blue);}
.tab.center .fab{width:50px;height:50px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;margin:-18px auto 0;box-shadow:0 6px 16px rgba(37,99,235,.45);}
.tab.center .fab .ti{color:#fff;font-size:24px;}

/* lists */
.li{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line2);}
.li:last-child{border-bottom:none;}
.ic{width:42px;height:42px;border-radius:12px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic .ti{font-size:21px;color:var(--blue);}
.qty{display:flex;align-items:center;gap:10px;}
.qbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--blue);color:var(--blue);background:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.stepper{display:flex;gap:6px;margin-bottom:14px;}
.stepper .s{flex:1;height:4px;border-radius:3px;background:var(--line);}
.stepper .s.on{background:var(--blue);}
.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;}
.note{background:var(--blue-l);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--blue-d);line-height:1.5;}
.note.warn{background:var(--warn-l);color:var(--warn);}
.seg{display:flex;gap:8px;margin-bottom:14px;}
.seg .o{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px;text-align:center;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;background:#fff;}
.seg .o.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.csel{font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:20px;border:1.5px solid var(--line);color:var(--ink2);cursor:pointer;background:#fff;white-space:nowrap;}
.csel.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.slip{flex-shrink:0;font-size:12px;font-weight:600;padding:6px 12px;border-radius:18px;border:1.5px solid var(--line);color:var(--ink2);background:#fff;cursor:pointer;white-space:nowrap;}
.slip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.slip.add{border-style:dashed;color:var(--blue);}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;background:var(--bg);color:var(--ink2);}
.diamond{color:var(--gold);font-size:10px;}
.diamond.dim{color:#D8C9A6;}
.empty{text-align:center;padding:40px 20px;color:var(--ink3);}
.empty .ti{font-size:46px;color:var(--line);}
.kbd{background:#000;}
.flowmap{font-size:10px;color:#64748b;max-width:340px;text-align:center;line-height:1.6;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<div class="col">
  <div class="lbl">FABiBox — Prototype hành trình đầy đủ (bấm để đi xuyên flow)</div>
  <div class="hint" id="globalhint">Bắt đầu từ Splash → Intro. Dùng nút ⟲ để reset về đầu. Mỗi lối tắt trên Home đều bấm tới bước hoàn thành.</div>
</div>
<script>
/* ============ STATE ============ */
var S={};
function reset(){
  S={
    industry:null, industryLabel:'', storeName:'', phone:'', storeAddr:'', storeProvince:'Hồ Chí Minh', storeType:'',
    activated:false,        // đã có đơn THẬT
    demoPresent:true,       // còn đơn demo trên home
    realRevenue:0, realCount:0, realOrders:[], revYesterday:2800000, editingOrderId:null, voidedOrders:[],
    demoRevenue:45000,
    menu:[
      {id:1,name:'Cà phê sữa',price:25000,sample:true},
      {id:2,name:'Cà phê đen',price:20000,sample:true},
      {id:3,name:'Bạc xỉu',price:30000,sample:true},
      {id:4,name:'Trà đào',price:35000,sample:true},
      {id:5,name:'Trà tắc',price:20000,sample:true},
    ],
    menuGroups:[],          // nhóm món thật (explicit, có thể rỗng); fallback classifyMon
    menuFilter:'', menuCat:'Tất cả',   // tìm/lọc trong màn Quản lý thực đơn
    banners:[                          // cấu hình từ backend (bật/tắt từng banner), KHÔNG hard-code render
      {id:'pro',on:true,icon:'ti-diamond-filled',bg:'#9A6A00',title:'Quà mốc: giảm 20% gói Pro',sub:'Tháng đầu — bạn vừa bán đơn thật đầu tiên',cta:'Nâng cấp ngay',action:"go('goi')",hsd:'2026-07-31'},
      {id:'shop',on:true,icon:'ti-shopping-bag',bg:'#1E3F87',title:'Cửa hàng thiết bị FABiBox',sub:'Máy in, giấy in, tablet… giao tận nơi',cta:'Mua sắm',action:"go('shop')",hsd:'2026-06-30'},
      {id:'momo',on:true,icon:'ti-wallet',bg:'#A50064',title:'Ví trả sau MoMo',sub:'Chi trước, trả sau — không lo đứt vốn',cta:'Tìm hiểu',action:"go('momopay')",hsd:'2026-07-15'},
      {id:'report',on:true,icon:'ti-file-analytics',bg:'#0F7B6C',title:'Báo cáo ngành F&B 2026',sub:'Số liệu & xu hướng mới nhất',cta:'Nhận báo cáo',action:"go('fnbreport')",hsd:''}
    ],
    shopCart:{}, shopVoucher:null, shopAddr:'', shopPay:'cod', leadSent:false, _prod:'', bannerDismiss:{}, voucherRemoved:false,
    cart:{}, orderType:'mangdi', orderPay:'mat', orderNote:'',
    tables:[], areas:[], tableOrders:{}, activeTable:'', useTable:false, askedTable:false, tableHintDismissed:false, soldTable:false, banSkipped:false, sdTab:'Tất cả', sdEdit:false, sdSort:false, setupRows:null,
    staff:[], nvPreviewLocked:false, foodapp:{grab:false,shopee:false}, qrPay:false, qrBank:'', qrAccNo:'', qrAccName:'', qrOnReceipt:true, qrHasLoa:null, qrHkdOpen:false, momoWhyOpen:false, payAccounts:[], _payEdit:null, qrTables:[], printerConnected:false, printers:[], slips:[], slipSeq:0, preActive:false, preDraft:null, preEditId:null, preExpanded:false, preSeq:0, closingPre:null, onlineOrders:[],
    webOn:false, webSeen:false, webFrom:'07:00', webTo:'21:00', webHidden:{}, webCover:false,
    webPrepay:false, webShipTiers:[{km:3,fee:15000},{km:6,fee:25000}], webDist:2,
    lineMeta:{}, lineNotes:{}, noteOpen:false, discoverHidden:{}, discoverExpanded:false, discoverCollapsed:false, p2Hidden:{}, p2Expanded:false, setupHidden:{}, setupSnooze:{}, setupCollapsed:false, setupExpanded:false, bcOpen:{}, promos:[], serviceFee:{on:false,pct:5,name:'Phụ thu',mode:'auto',from:'',to:''}, bhCat:'Tất cả',
    optionGroups:[
      {id:'og_top',name:'Nhóm Topping',kind:'topping',options:[{name:'Topping A',price:0},{name:'Topping B',price:0},{name:'Topping C',price:0}]},
      {id:'og_duong',name:'Mức đường',kind:'mucduong',options:[{name:'100%',price:0},{name:'70%',price:0},{name:'50%',price:0},{name:'30%',price:0},{name:'Không đường',price:0}]},
      {id:'og_da',name:'Mức đá',kind:'mucda',options:[{name:'100%',price:0},{name:'70%',price:0},{name:'50%',price:0},{name:'30%',price:0},{name:'Không đá',price:0}]}
    ],
    noteChips:['Nóng','Đá','Ít cay','Ít ngọt'],
    expenses:[], isPro:false, trialActive:true, trialDays:14, trialStart:Date.now(), graceActive:false, graceDays:5,
    quyTx:[], quyExtra:[], quyOpening:{}, quyFilter:{type:'all',acc:'all',kind:'all',time:'all'}, quyNudgeOff:false, quyOff:{}, quyDir:'all', accDir:'all', _chiEdit:null, _thuEdit:null,
    quyName:{}, catChi:catChiDefault(), catThu:catThuDefault(), dmTab:'chi',
    chanCfg:{grab:{comm:25,fee:0,acc:'bank'},shopee:{comm:25,fee:0,acc:'bank'},xanh:{comm:20,fee:0,acc:'bank'},be:{comm:25,fee:0,acc:'bank'}}, bhSource:'quan', sanWd:{}, saleChannels:['grab','shopee'], donCh:'all',
    quyPeriod:'month', bcPeriod:'today', qbcPeriod:'month', periodFrom:{}, periodTo:{},
    hdFilter:'today', hdStatus:'all', hdPay:'all', hdSource:'all', hdSearch:'',
    accDetailId:null, accPeriod:'month', chiFav:['Nguyên vật liệu','Điện'],
    customers:[], aiDetected:[], aiPages:[], qrTableSel:'', momoLinked:false, heldOrders:[], introVariant:'A', goiCycle:'thang', journeyDone:false, journeySkip:{}, btState:'idle', printerName:'', printKitchen:true, printReceipt:false, printerHave:null, printerHintCount:0, printerSize:'', printerSizeOK:false, printerConn:'', printMode:'kitchen', kitchenForm:'ticket', printGroups:null, autoKitchen:true, receiptOnRequest:false, receiptTpl:'full', kitchenSeparate:false, kitchenPrinterConnected:false, kitchenPrinterConn:'', temConnected:false, temName:'', temConn:'', temAutoPrint:true, temGroups:null, temSize:'50x30', temFields:{opts:true,table:true,time:true,order:true,store:true},
    nav:[], demoSoldOnce:false, qbcScope:'kd', qbcFlow:'chi', qbcOpenGrp:null,
    units:['món','cốc','ly','tô','đĩa','phần','gói','cái','chai','lon','suất']
  };
}
reset();

/* ============ ROUTER ============ */
var ROOT;
function go(name,push){if(name=='maytin'&&!S.printerConnected&&!S._printerKeepAsk){S.printerHave=null;S.btState='idle';}S._printerKeepAsk=false;if(push!==false)S.nav.push(name);render(name);}
function back(){S.nav.pop();var prev=S.nav[S.nav.length-1]||'splash';render(prev);}
function render(name){
  var def=SCREENS[name];if(!def){console.warn('no screen',name);return;}
  var r=def();
  ROOT.innerHTML='<div class="statusbar"><span>9:41</span><span class="r"><i class="ti ti-signal-4g"></i><i class="ti ti-wifi"></i><i class="ti ti-battery-3"></i></span></div>'+r.html;
  if(r.init)r.init();
  var sc=ROOT.querySelector('.scroll');if(sc)sc.scrollTop=0;
}
function toast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;ROOT.appendChild(t);
  requestAnimationFrame(function(){t.classList.add('show');});
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){t.remove();},250);},1900);
}
function money(n){return n.toLocaleString('vi-VN')+'₫';}
function slugify(s){s=(s||'Quán của tôi').toLowerCase();
  var map={'à':'a','á':'a','ạ':'a','ả':'a','ã':'a','â':'a','ầ':'a','ấ':'a','ậ':'a','ẩ':'a','ẫ':'a','ă':'a','ằ':'a','ắ':'a','ặ':'a','ẳ':'a','ẵ':'a','è':'e','é':'e','ẹ':'e','ẻ':'e','ẽ':'e','ê':'e','ề':'e','ế':'e','ệ':'e','ể':'e','ễ':'e','ì':'i','í':'i','ị':'i','ỉ':'i','ĩ':'i','ò':'o','ó':'o','ọ':'o','ỏ':'o','õ':'o','ô':'o','ồ':'o','ố':'o','ộ':'o','ổ':'o','ỗ':'o','ơ':'o','ờ':'o','ớ':'o','ợ':'o','ở':'o','ỡ':'o','ù':'u','ú':'u','ụ':'u','ủ':'u','ũ':'u','ư':'u','ừ':'u','ứ':'u','ự':'u','ử':'u','ữ':'u','ỳ':'y','ý':'y','ỵ':'y','ỷ':'y','ỹ':'y','đ':'d'};
  s=s.replace(/[^ -~]/g,function(c){return map[c]||c;});
  return s.replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||'quan';}
function webSlug(){return slugify(S.storeName);}
function webUrl(){return webSlug()+'.fabibox.vn';}
function cartCount(){var c=0;for(var k in S.cart)c+=S.cart[k];return c;}
/* Giá theo nguồn: Tại quán = giá gốc; sàn = giá riêng (m.priceCh[src]) nếu có. bhSource chỉ khác 'quan' lúc đang bán đơn sàn. */
function chPrice(m,src){src=src||S.bhSource||'quan';if(!m)return 0;if(src=='quan')return m.price;return (m.priceCh&&m.priceCh[src]!=null)?m.priceCh[src]:m.price;}
/* Giá topping/món ăn kèm theo kênh (dùng chung 1 lần cho mọi món dùng option đó) */
function optPrice(o,src){src=src||S.bhSource||'quan';if(!o)return 0;if(src=='quan')return o.price||0;return (o.priceCh&&o.priceCh[src]!=null)?o.priceCh[src]:(o.price||0);}
function resolveLine(key){
  if(String(key).indexOf('RT:')===0){var pp=String(key).split(':');var rg=findOG(pp[1]);var ro=rg&&rg.options[parseInt(pp[2])];return ro?{name:ro.name+' (lẻ)',price:optPrice(ro),retail:true}:{name:'Món lẻ',price:0};}
  if(S.lineMeta&&S.lineMeta[key])return S.lineMeta[key];var m=S.menu.find(function(x){return x.id==key;});return m?{name:m.name,price:chPrice(m)}:{name:'Món',price:0};}
/* Topping/món ăn kèm có bật "bán lẻ" — bán độc lập, key RT:gid:idx (tách khỏi T: gắn món) */
function retailOptions(){var out=[];(S.optionGroups||[]).forEach(function(g){if(g.kind!='topping'&&g.kind!='anken')return;(g.options||[]).forEach(function(o,oi){if(o.retail)out.push({gid:g.id,oi:oi,name:o.name,o:o});});});return out;}
function bhRetailQty(key,d){var cur=S.cart[key]||0;var nw=Math.max(0,cur+d);if(nw===0)delete S.cart[key];else S.cart[key]=nw;renderBhList();}
function bhRetailSet(key,v){var n=parseInt((v||'').replace(/\D/g,''))||0;if(n<=0)delete S.cart[key];else S.cart[key]=n;renderBhList();}
function cartTotal(){var t=0;for(var k in S.cart){var m=resolveLine(k);if(m)t+=m.price*S.cart[k];}return t;}

/* tab bar + appbar helpers */
function appbar(title,opts){opts=opts||{};
  return '<div class="appbar">'+(opts.noBack?'':'<i class="ti ti-chevron-left" onclick="'+(opts.onBack||'back()')+'"></i>')+
    '<h1>'+title+'</h1>'+(opts.right||'')+'</div>';
}
function tabbar(active){
  function t(id,scr,ic,label){return '<div class="tab '+(active==id?'on':'')+'" onclick="go(\''+scr+'\')"><i class="ti '+ic+'"></i><span>'+label+'</span></div>';}
  return '<div class="tabbar">'+
    t('home','home','ti-building-store','Trang chủ')+
    t('invoice','hoadon','ti-file-invoice','Hóa đơn')+
    '<div class="tab center" onclick="startSell()"><div class="fab"><i class="ti ti-plus"></i></div></div>'+
    t('money','dongtien','ti-wallet','Quỹ tiền')+
    t('more','khac','ti-menu-2','Khác')+
  '</div>';
}
function diamond(dim){return S.isPro?'':'<i class="ti ti-diamond-filled diamond'+(dim?' dim':'')+'" title="Tính năng Pro"></i>';}

/* paywall: show value, then gate. Day0 (chưa activate) => không chặn, chỉ giới thiệu */
var PRO_PREVIEW={
 staff:{title:'Cho nhân viên bán cùng bạn',outcome:'Giao việc, phân ca, phân quyền — rảnh tay mà không lo thất thoát.',
   preview:'<div class="muted tiny" style="font-weight:700;margin-bottom:6px">Nhân viên &amp; ca làm</div>'+
     '<div style="display:flex;align-items:center;gap:9px;padding:5px 0"><div class="ic" style="width:28px;height:28px;background:#F1ECFB"><i class="ti ti-user" style="color:#7C3AED;font-size:15px"></i></div><div style="flex:1"><div style="font-size:12px;font-weight:600">Chị Hoa · Pha chế</div><div class="muted tiny">Ca sáng 7:00–14:00</div></div><span class="pill ok" style="font-size:9px">Đang bán</span></div>'+
     '<div style="display:flex;align-items:center;gap:9px;padding:5px 0;border-top:1px solid var(--line2)"><div class="ic" style="width:28px;height:28px;background:#F1ECFB"><i class="ti ti-user" style="color:#7C3AED;font-size:15px"></i></div><div style="flex:1"><div style="font-size:12px;font-weight:600">Em Tú · Thu ngân</div><div class="muted tiny">Ca chiều 14:00–21:00</div></div></div>'},

/* Đếm lùi thời gian dùng thử */
function trialMsLeft(){var end=(S.trialStart||Date.now())+(S.trialDays||14)*86400000;return Math.max(0,end-Date.now());}
function trialDaysLeft(){return Math.ceil(trialMsLeft()/86400000);}
function fmtCountdown(ms){var d=Math.floor(ms/86400000);ms-=d*86400000;var h=Math.floor(ms/3600000);ms-=h*3600000;var m=Math.floor(ms/60000);ms-=m*60000;var s=Math.floor(ms/1000);return d+' ngày '+('0'+h).slice(-2)+':'+('0'+m).slice(-2)+':'+('0'+s).slice(-2);}
function tickTrialClock(){var el=document.getElementById('trial-clock');if(!el)return;el.textContent=fmtCountdown(trialMsLeft());}
function startTrialClock(){if(S._trialTimer)clearInterval(S._trialTimer);S._trialTimer=setInterval(tickTrialClock,1000);tickTrialClock();}

function seedConfigByIndustry(id){
  if(isFoodInd(id)){
    S.optionGroups=[ankenGroup(id)];
    S.noteChips=['Ít cay','Không hành','Mang đi'];
  }else if(isDrinkInd(id)){
    S.optionGroups=[toppingGroup(id)].concat(mucGroups());
    S.noteChips=['Đá riêng','Ít ngọt','Ít sữa'];

    '<div class="scroll"><div class="pad" style="display:flex;flex-direction:column;gap:14px">';

  var aov=cnt?Math.round(rev/cnt):0;var chi=S.expenses.filter(function(e){return e.kind!='cn';}).reduce(function(a,b){return a+b.amount;},0);
  var trendPct=(S.activated&&S.revYesterday>0&&rev>0)?Math.round((rev-S.revYesterday)/S.revYesterday*100):null;
  var trendHtml=trendPct!=null?'<span style="font-size:12px;font-weight:600;opacity:.95"><i class="ti ti-arrow-'+(trendPct>=0?'up':'down')+'-right"></i> '+(trendPct>=0?'Tăng':'Giảm')+' '+Math.abs(trendPct)+'% so với hôm qua</span>':'';
  if(!S.activated&&!isDemo){
    // Day-0 thuần: chưa có gì để khoe → thẻ doanh thu thu nhỏ, nhường tiêu điểm cho "2 bước"
    html+='<div class="card" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="go(\'baocao\')"><div><div style="font-size:12px;color:var(--ink2)">Doanh thu hôm nay</div><div style="font-size:20px;font-weight:700">'+money(rev)+'</div></div><span class="muted tiny">Xem báo cáo ›</span></div>';
  }else{
    html+='<div class="card" style="background:var(--blue);color:#fff">'+
      '<div style="font-size:13px;opacity:.9">Doanh thu hôm nay</div>'+
      '<div style="display:flex;align-items:center;gap:12px;margin-top:4px">'+
        '<span style="font-size:30px;font-weight:800;line-height:1">'+money(rev)+'</span>'+(isDemo?'<span class="pill demo" style="vertical-align:middle">Số liệu thử</span>':'')+
        '<div style="margin-left:auto;text-align:right;padding-left:14px;border-left:1px solid rgba(255,255,255,.2)"><div style="font-size:11px;opacity:.85">Số đơn</div><div style="font-size:18px;font-weight:700">'+cnt+'</div></div>'+
      '</div>'+
      (trendHtml?'<div style="margin-top:6px">'+trendHtml+'</div>':'')+
      '<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.16);padding-top:11px"><div onclick="go(\'baocao\')" style="background:rgba(255,255,255,.16);border-radius:10px;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-chart-line"></i> Báo cáo kinh doanh <i class="ti ti-chevron-right" style="font-size:14px"></i></div></div>'+
    '</div>';
  }
  var hasRealMenu=S.menu.some(function(m){return !m.sample;});
  if(!S.activated){
    // ===== DAY 0 — "Bắt đầu bán hàng" là chính; "Hoàn thiện quán" hiện 3 việc quan trọng, mở rộng để xem đủ =====
    if(isDemo)html+='<div class="note warn"><b>Đây là đơn bán thử.</b> Bán đơn thật đầu tiên, số liệu thử sẽ tự được dọn để báo cáo chính xác.</div>';
    html+=journeyBlock(hasRealMenu);
    html+=hoanThienBlock();   // dưới "Bắt đầu bán hàng" — phụ, không lấn focus đơn đầu
  }else{
    // ===== ĐÃ ACTIVE — đầy đủ =====
    html+=vanhanhHub();
    var loiTat=loiTatGrid();
    // Hoàn thiện quán: còn việc & mở rộng → TRÊN Lối tắt; thu gọn/hết việc → Lối tắt lên trước, checklist xuống 1 dòng
    var ht=hoanThienBlock();

    html+=htBelow?(loiTat+ht):(ht+loiTat);
    html+=contextualBanner();   // 1 slot ngữ cảnh, đặt cuối — không lấn lõi vận hành
  }
  html+='</div></div>'+tabbar('home')+'</div>';
  return{html:html,init:function(){}};
};

/* Lối tắt cá nhân hóa theo hành trình Hoàn thiện quán:

   tính năng đã làm → không hiện; xong hết → về mặc định 1 dòng. "Xem thêm" = popup. */
/* Lối tắt user tự ghim (cá nhân hóa) */

  ['baocao','ti-chart-bar','Báo cáo'],['hoadon','ti-receipt','Hóa đơn'],['menu','ti-tools','Thực đơn'],
  ['dongtien','ti-wallet','Quỹ tiền'],['sodoban','ti-layout-grid','Sơ đồ bàn'],['khachhang','ti-address-book','Khách hàng'],
  ['nhanvien','ti-users','Nhân viên'],['qr','ti-qrcode','QR nhận tiền'],['weborder','ti-world','Trang đặt hàng'],
  ['foodapp','ti-device-mobile','Grab/Shopee'],['maytin','ti-printer','Máy in'],['dattruoc','ti-clock-hour-4','Đặt trước'],
  ['khuyenmai','ti-discount','Khuyến mãi'],['phidichvu','ti-percentage','Phí dịch vụ'],['thue','ti-file-invoice','Kê khai thuế']
];
function catItem(k){return SHORTCUT_CATALOG.filter(function(x){return x[0]==k;})[0];}
function loitatPins(){if(!S.loitatPins)S.loitatPins=['baocao','hoadon','menu'];return S.loitatPins;}
function loiTatGrid(){
  var cells=loitatPins().map(function(k){var c=catItem(k);return c?shortcut(c[1],c[2],c[0]):'';}).join('')+shortcut('ti-dots','Xem thêm','__more');
  return '<div><div class="row" style="margin-bottom:8px;align-items:center"><b style="font-size:14px">Lối tắt</b><span onclick="openLoiTatEdit()" style="font-size:12.5px;color:var(--blue);cursor:pointer;font-weight:600"><i class="ti ti-pencil" style="font-size:13px"></i> Sửa</span></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">'+cells+'</div></div>';
}
function openLoiTatEdit(){
  mkSheet('lt-dia','<div style="font-size:17px;font-weight:700;margin-bottom:2px">Chỉnh Lối tắt</div><div class="muted tiny" style="margin-bottom:12px">Ghim tính năng hay dùng để truy cập nhanh từ Trang chủ — tối đa 7.</div><div id="lt-body" style="max-height:48vh;overflow:auto"></div><button class="btn" style="margin-top:12px" onclick="rmSheet(\'lt-dia\');render(\'home\');toast(\'Đã lưu Lối tắt\')">Xong</button>');
  renderLoiTatEdit();
}
function toggleLoiTatPin(k){var p=loitatPins();var i=p.indexOf(k);if(i>=0)p.splice(i,1);else{if(p.length>=7){toast('Tối đa 7 lối tắt');return;}p.push(k);}renderLoiTatEdit();}
function renderLoiTatEdit(){
  var el=document.getElementById('lt-body');if(!el)return;var p=loitatPins();
  el.innerHTML=SHORTCUT_CATALOG.map(function(c){var on=p.indexOf(c[0])>=0;
    var box=on?'<span style="width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-check" style="color:#fff;font-size:14px"></i></span>':'<span style="width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink3);flex-shrink:0"></span>';
    return '<div class="li" style="cursor:pointer;padding:9px 2px" onclick="toggleLoiTatPin(\''+c[0]+'\')"><div class="ic" style="background:'+(on?'var(--blue-l)':'var(--bg)')+'"><i class="ti '+c[1]+'" style="color:'+(on?'var(--blue)':'var(--ink3)')+'"></i></div><div style="flex:1;font-size:14px;font-weight:'+(on?'600':'400')+'">'+c[2]+'</div>'+box+'</div>';
  }).join('');
}
function shortcut(ic,label,scr){
  var more=scr=='__more';
  return '<div onclick="'+(more?'openXemThem()':'go(\''+scr+'\')')+'" style="background:#fff;border-radius:12px;padding:10px 3px;text-align:center;cursor:pointer'+(more?';border:1px dashed var(--line)':'')+'">'+
    '<i class="ti '+ic+'" style="font-size:20px;color:'+(more?'var(--ink2)':'var(--blue)')+'"></i>'+
    '<div style="font-size:10px;margin-top:4px;line-height:1.2;color:'+(more?'var(--ink2)':'var(--ink)')+'">'+label+'</div></div>';
}

function discoveryShelf(){
  var avail=discoverItemsAvail();
  // Thu gọn → 1 dòng mở lại được, Lối tắt đã lên trên
  if(S.discoverCollapsed){
    return '<div class="li" style="cursor:pointer;border:1px solid var(--line);border-radius:12px;padding:11px 12px" onclick="S.discoverCollapsed=false;render(\'home\')"><div class="ic" style="background:var(--blue-l)"><i class="ti ti-bulb" style="color:var(--blue)"></i></div><div style="flex:1"><div style="font-weight:600;font-size:14px">Hoàn thiện vận hành quán'+(avail.length?' <span class="muted tiny">· '+avail.length+' gợi ý</span>':'')+'</div></div><i class="ti ti-chevron-down" style="color:var(--ink3)"></i></div>';
  }
  // Hết gợi ý → vẫn giữ 1 dòng (đã thiết lập xong)
  if(!avail.length){
    return '<div class="li" style="border:1px solid var(--line);border-radius:12px;padding:11px 12px"><div class="ic" style="background:var(--blue-l)"><i class="ti ti-circle-check" style="color:var(--ok)"></i></div><div style="flex:1"><div style="font-weight:600;font-size:14px">Đã thiết lập xong các gợi ý</div><div class="muted tiny">Khám phá thêm công cụ ở mục Khác</div></div></div>';
  }

];}
function setupAvail(){return setupTasks().filter(function(t){return !t.done&&t.show&&!(S.setupHidden&&S.setupHidden[t.k])&&!(S.setupSnooze&&S.setupSnooze[t.k]);});}
// Quen tay bán hàng sau đơn đầu:
//  B.A "Thiết lập sơ đồ bàn" (có nút Bỏ qua)
//  Nhánh 1 (thiết lập): Tạo 1 đơn tại bàn → RỒI Tạo 1 đơn đặt trước
//  Nhánh 2 (bỏ qua):    Tạo 1 đơn đặt trước
// → "đặt trước" LUÔN có ở cả 2 nhánh. Quyết định bàn xong mới hiện bước luyện đơn.
function setupTier1(){
  var av=setupAvail();function pick(k){return av.filter(function(t){return t.k==k;})[0];}
  var tablesSet=S.useTable&&S.tables.length>0;
  var tablesSkipped=(S.setupHidden&&S.setupHidden.ban)||(S.setupSnooze&&S.setupSnooze.ban)||S.banSkipped||(S.askedTable&&!S.useTable);
  var out=[];
  if(!tablesSet&&!tablesSkipped){var b=pick('ban');if(b)out.push(b);return out;}  // chưa quyết → chỉ hiện "Thiết lập sơ đồ bàn"
  if(tablesSet){var t=pick('taiban');if(t)out.push(t);}                            // đã có bàn → luyện đơn tại bàn
  var p=pick('pre');if(p)out.push(p);                                              // đặt trước: luôn có ở cả 2 nhánh
  return out;
}
function setupTier2(){return setupAvail().filter(function(t){return t.tier==2;});}
function setupSnoozedN(){return setupTasks().filter(function(t){return !t.done&&t.show&&!(S.setupHidden&&S.setupHidden[t.k])&&S.setupSnooze&&S.setupSnooze[t.k];}).length;}

  var more=list.length>3?(S.setupExpanded

  var snzLine=snz?'<div class="muted tiny" style="text-align:center;padding-top:4px;border-top:1px solid var(--line2)">'+snz+' việc để sau · <span style="color:var(--blue);font-weight:600;cursor:pointer" onclick="setupUnsnooze()">Hiện lại</span></div>':'';
  return '<div class="card"><div class="row" style="margin-bottom:2px"><div><div style="font-size:14px;font-weight:700">'+title+'</div><div class="muted tiny" style="margin-top:1px">'+sub+'</div></div><span class="muted tiny" style="cursor:pointer;white-space:nowrap" onclick="S.setupCollapsed=true;render(\'home\')">Thu gọn ▴</span></div>'+rows+more+snzLine+'</div>';

function classifyMon(name){
  var n=(name||'').toLowerCase();
  if(/cà phê|cafe|caphe|bạc xỉu|espresso|americano|latte|cappuccino|nâu|đen đá/.test(n))return 'Cà phê';
  if(/trà sữa|trà|tea|hồng trà|lục trà|matcha|trân châu|đường đen|ô long|oolong|sữa tươi|flan|pudding/.test(n))return 'Trà & trà sữa';
  if(/sinh tố|nước ép|ép|smoothie|đá xay/.test(n))return 'Sinh tố / Nước ép';
  if(/nước|soda|cam|chanh|me|dừa|yến/.test(n))return 'Giải khát';
  if(/bánh|cake|croissant|tart/.test(n))return 'Bánh';
  if(/cơm|phở|bún|mì|hủ tiếu|xôi|cháo/.test(n))return 'Món ăn';
  return 'Khác';
}

  else go('orderdone');

function quyMonthlySeries(n){n=n||6;var now=new Date();var arr=[];var hist=quyHistory();var exps=S.expenses||[];
  for(var k=n-1;k>=0;k--){var d=new Date(now.getFullYear(),now.getMonth()-k,1);var m=d.getMonth(),y=d.getFullYear();var dt=0,ck=0;

function qbcBuckets(P){var now=new Date();var bk=[];
  function mk(label,from,to){bk.push({label:label,from:from.getTime(),to:to.getTime(),thu:0,chi:0,chicn:0});}
  if(P=='year'){var y=now.getFullYear();for(var m=0;m<12;m++)mk((m+1)+'',new Date(y,m,1),new Date(y,m+1,1));}
  else if(P=='quarter'){var y2=now.getFullYear();var q=Math.floor(now.getMonth()/3);for(var i=0;i<3;i++){var mm=q*3+i;mk('Th'+(mm+1),new Date(y2,mm,1),new Date(y2,mm+1,1));}}
  else if(P=='month'){var y3=now.getFullYear(),mo=now.getMonth();var di=new Date(y3,mo+1,0).getDate();var w=1;for(var d=1;d<=di;d+=7){mk('Tuần '+w,new Date(y3,mo,d),new Date(y3,mo,Math.min(d+7,di+1)));w++;}}
  else{for(var j=6;j>=0;j--){var dd=new Date(now.getTime()-j*86400000);var d0=new Date(dd.getFullYear(),dd.getMonth(),dd.getDate());mk(['CN','T2','T3','T4','T5','T6','T7'][dd.getDay()],d0,new Date(d0.getTime()+86400000));}}
  quyHistory().forEach(function(r){if(r.type!='thu')return;for(var i=0;i<bk.length;i++){if(r.t>=bk[i].from&&r.t<bk[i].to){bk[i].thu+=r.amount;break;}}});
  S.expenses.forEach(function(e){for(var i=0;i<bk.length;i++){if(e.t>=bk[i].from&&e.t<bk[i].to){if(e.kind=='cn')bk[i].chicn+=e.amount;else bk[i].chi+=e.amount;break;}}});
  return bk;}

function qbcDonut(cats,total){var off=25;var segs=cats.slice(0,7).map(function(c,i){var pct=total?(c.v/total*100):0;var s='<circle cx="21" cy="21" r="15.9" fill="none" stroke="'+QBC_COLS[i%QBC_COLS.length]+'" stroke-width="8" stroke-dasharray="'+pct.toFixed(1)+' '+(100-pct).toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"></circle>';off-=pct;return s;}).join('');

function last7Days(){
  var todayChi=S.expenses.reduce(function(a,b){return a+b.amount;},0);
  var demoRev=[1900000,2500000,2200000,3000000,3400000,2700000];
  var demoChi=[700000,500000,800000,600000,900000,500000];
  var wd=['CN','T2','T3','T4','T5','T6','T7'];var out=[];var now=new Date();
  for(var i=6;i>=0;i--){var p=6-i;var d=new Date(now.getTime()-i*86400000);
    out.push({label:wd[d.getDay()],rev:(p<6?demoRev[p]:(S.realRevenue||0)),chi:(p<6?demoChi[p]:todayChi)});}
  return out;
}

function bcDrill(type,val,label){
  var list;
  if(type=='pay')list=S.realOrders.filter(function(o){return (o.source||'quan')=='quan'&&o.pay==val;});
  else if(type=='type')list=S.realOrders.filter(function(o){return o.type==val;});
  else if(type=='mon')list=S.realOrders.filter(function(o){return o.items&&Object.keys(o.items).some(function(k){return String(k).split('|')[0]==val;});});
  else if(type=='src')list=S.realOrders.filter(function(o){return (o.source||'quan')==val;});
  else list=[];
  S.bcFilter={label:label,list:list};go('bcDetail');
}

function inPeriodT(t,p,target){p=p||'today';var now=new Date();var d=new Date(t||0);function ds(x){return new Date(x.getFullYear(),x.getMonth(),x.getDate()).getTime();}var dd=ds(d),nd=ds(now);
  if(p=='today')return dd==nd;
  if(p=='week'){var dow=(now.getDay()+6)%7;var s=nd-dow*864e5;return dd>=s&&dd<s+7*864e5;}
  if(p=='month')return d.getMonth()==now.getMonth()&&d.getFullYear()==now.getFullYear();
  if(p=='quarter')return d.getFullYear()==now.getFullYear()&&Math.floor(d.getMonth()/3)==Math.floor(now.getMonth()/3);
  if(p=='year')return d.getFullYear()==now.getFullYear();
  if(p=='custom'){var f=(S.periodFrom||{})[target],to=(S.periodTo||{})[target];if(!f||!to)return true;var fd=new Date(f+'T00:00:00').getTime(),td=new Date(to+'T23:59:59').getTime();return (t||0)>=fd&&(t||0)<=td;}
  return true;}

function quyAccListRaw(){
  var L=[{id:'cash',type:'cash'}];

  if(S.qrPay||hasCK)L.push({id:'bank',type:'bank',name:S.qrBank||undefined});
  if(S.momoLinked)L.push({id:'momo',type:'momo',sync:true});
  payOtherList().forEach(function(a){var hasOrd=S.realOrders.some(function(o){return o.pay==a.id;});if(a.active!==false||hasOrd)L.push({id:a.id,type:'other',name:a.name});});
  /* TK nhận tiền sàn (khai ở Đơn online) — dedupe theo số TK: trùng TK Bán hàng thì gộp vào 'bank' (không thêm), khác số thì là 1 TK riêng */
  var bankNos=(S.payAccounts||[]).filter(function(a){return a.type=='bank';}).map(function(a){return a.accNo;});var seenSan={};
  ['grab','shopee','xanh','be'].forEach(function(ch){var c=(S.chanCfg&&S.chanCfg[ch])||{};if(c.sanAccNo&&bankNos.indexOf(c.sanAccNo)<0&&!seenSan[c.sanAccNo]){seenSan[c.sanAccNo]=1;L.push({id:'sanbk_'+c.sanAccNo,type:'bank',name:(c.sanBank||'Ngân hàng')+' ····'+(''+c.sanAccNo).slice(-4)});}});

  return L.map(function(a){return {id:a.id,type:a.type,sync:a.sync,name:(S.quyName&&S.quyName[a.id])||a.name||accDefName(a.type),icon:a.icon||accIcon(a.type),col:a.col||accColor(a.type),off:!!(S.quyOff&&S.quyOff[a.id])};});
}

var SAN_TAX=4.5;
function isSanOrder(o){return o.source=='grab'||o.source=='shopee'||o.source=='be'||o.source=='xanh';}
function chanCfg(src){return (S.chanCfg&&S.chanCfg[src])||{comm:25,fee:0,acc:'bank'};}
function sanRate(src){var c=chanCfg(src);return c.comm!=null?c.comm:25;}
function chanAcc(src){return chanCfg(src).acc||'bank';}
function sanComm(o){return Math.round(o.total*sanRate(o.source)/100);}
function sanTaxRate(src){var c=chanCfg(src);return c.tax!=null?c.tax:SAN_TAX;}
function sanTax(o){return Math.round(o.total*sanTaxRate(o.source)/100);}
function sanTaxGtgt(o){return Math.round(o.total*3/100);}
function sanTaxTncn(o){return Math.round(o.total*1.5/100);}
function sanKm(o){return o.km||0;}
function sanFee(o){return o.fee!=null?o.fee:chanCfg(o.source).fee||0;}
function sanNet(o){return o.total-sanComm(o)-sanTax(o)-sanKm(o)-sanFee(o);}
function sanCommTotal(){return S.activated?S.realOrders.reduce(function(a,o){return a+(isSanOrder(o)?sanComm(o):0);},0):0;}
function sanSettleDate(o){var d=new Date(o.t||Date.now());d.setDate(d.getDate()+1);if(o.source=='shopee'){while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);}return d;}

function sanPendingNet(){return S.activated?S.realOrders.reduce(function(a,o){return a+((isSanOrder(o)&&!o.settled)?sanNet(o):0);},0):0;}
/* Ví sàn = tiền đã đối soát về ví (ngoài Sổ quỹ), trừ phần đã rút. Chỉ khi RÚT mới vào Sổ quỹ. */
function sanSettledNet(plat){return S.activated?S.realOrders.reduce(function(a,o){return a+((o.source==plat&&o.settled)?sanNet(o):0);},0):0;}
function sanWalletBal(plat){return Math.max(0,sanSettledNet(plat)-((S.sanWd&&S.sanWd[plat])||0));}
function sanWalletTotal(){return SAN_CHANNELS.reduce(function(a,p){return a+sanWalletBal(p);},0);}

function sanOutsideQuy(){return sanPendingNet();}

function quyBalance(id){
  var b=(S.quyOpening&&S.quyOpening[id])||0;
  if(S.activated)S.realOrders.forEach(function(o){
    if(o.voided)return;             // đơn đã hủy: không cộng vào số dư (đã hoàn tiền khách)
    if(isSanOrder(o))return;        // tiền sàn ngoài Sổ quỹ (ở ví sàn), không cộng vào số dư quỹ
    if(quySaleAcc(o.pay)==id)b+=o.total;
  });
  S.expenses.forEach(function(e){if(quyExpAcc(e)==id)b-=e.amount;});
  (S.quyTx||[]).forEach(function(x){
    if(x.type=='thu'&&x.acc==id)b+=x.amount;
    else if(x.type=='transfer'){if(x.acc==id)b-=x.amount;if(x.toAcc==id)b+=x.amount;}
    else if(x.type=='adjust'&&x.acc==id)b+=x.delta;
  });
  return b;
}
function quyTotal(){return quyAccList().reduce(function(s,a){return s+quyBalance(a.id);},0);}

  });

  (S.voidedOrders||[]).forEach(function(o,i){rows.push({t:o.t||(7e11-i),type:'void',label:'Hủy đơn'+(o.id?' '+o.id:''),sub:'Hoàn tiền khách'+(o.reason?' · '+o.reason:''),acc:quySaleAcc(o.pay||'mat'),amount:o.total,kind:'kd'});});

  mkSheet('chanacc-dia','<div style="font-size:17px;font-weight:700;margin-bottom:2px">'+(has?'Sửa':'Khai')+' tài khoản nhận tiền</div><div class="muted tiny" style="margin-bottom:12px">Tiền sàn '+PLAT[ch][0]+' về tài khoản này. Khai riêng cho Đơn online — trùng số TK với Bán hàng thì Sổ quỹ ghi nhận là 1.</div>'+
    '<div class="field"><label>Ngân hàng</label><select id="ca-bank">'+bankOpts+'</select></div>'+
    '<div class="field"><label>Số tài khoản</label><input id="ca-accno" type="tel" inputmode="numeric" placeholder="Nhập số tài khoản" value="'+(c.sanAccNo||'')+'"></div>'+
    '<div class="field"><label>Tên chủ tài khoản</label><input id="ca-accname" placeholder="NGUYEN VAN A" value="'+(c.sanAccName||'')+'"></div>'+
    '<button class="btn" onclick="saveChanAcc(\''+ch+'\')">Lưu tài khoản</button>'+
    '<button class="btn ghost" style="margin-top:4px" onclick="rmSheet(\'chanacc-dia\')">Hủy</button>');}
function saveChanAcc(ch){var bank=(document.getElementById('ca-bank')||{}).value;var accNo=((document.getElementById('ca-accno')||{}).value||'').trim();var accName=((document.getElementById('ca-accname')||{}).value||'').trim();
  if(!accNo){toast('Nhập số tài khoản');return;}
  setChan(ch,'sanBank',bank);setChan(ch,'sanAccNo',accNo);setChan(ch,'sanAccName',accName);
  var bn=(S.payAccounts||[]).filter(function(a){return a.type=='bank'&&a.accNo==accNo;})[0];
  setChan(ch,'acc',bn?'bank':'sanbk_'+accNo);
  var dupOther=['grab','shopee','xanh','be'].some(function(k){return k!=ch&&S.chanCfg&&S.chanCfg[k]&&S.chanCfg[k].sanAccNo==accNo;});
  rmSheet('chanacc-dia');render('chankenh');
  toast((bn||dupOther)?'Trùng số TK — Sổ quỹ ghi nhận là 1':'Đã khai tài khoản nhận tiền');}
function chanUseBankAcc(ch){var b=(S.payAccounts||[]).filter(function(a){return a.type=='bank'&&a.active!==false;})[0];if(b){setChan(ch,'sanBank',b.bank);setChan(ch,'sanAccNo',b.accNo);setChan(ch,'sanAccName',b.accName);setChan(ch,'acc','bank');render('chankenh');toast('Đã dùng tài khoản Bán hàng — Sổ quỹ ghi nhận là 1');}}

  var accBlock='<div style="font-weight:700;font-size:13.5px;margin:2px 0 6px">Tài khoản nhận tiền từ sàn</div>'+

    (declared
      ? '<div class="card" style="display:flex;align-items:center;gap:11px;border:1px solid var(--line2);margin:0"><div class="ic" style="background:var(--blue-l)"><i class="ti ti-building-bank" style="color:var(--blue)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13.5px">'+(declared.bank||'Ngân hàng')+' ····'+last4(declared.accNo)+'</div><div class="muted tiny">'+(declared.accName||'')+'</div></div><span style="color:var(--blue);font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap" onclick="openChanAcc(\''+tab+'\')">Sửa</span></div>'
      : ((pbank?'<div onclick="chanUseBankAcc(\''+tab+'\')" style="display:flex;align-items:center;gap:10px;border:1px dashed var(--blue);border-radius:11px;padding:10px 12px;margin-bottom:8px;cursor:pointer"><div class="ic" style="background:var(--blue-l)"><i class="ti ti-building-bank" style="color:var(--blue)"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px">Dùng tài khoản đã khai ở Bán hàng?</div><div class="muted tiny">'+(pbank.bank||'Ngân hàng')+' ····'+last4(pbank.accNo)+' — dùng luôn</div></div><span style="color:var(--blue);font-weight:700;font-size:12px;white-space:nowrap">Dùng luôn</span></div>':'')+
        '<div style="border:1px dashed var(--line);border-radius:11px;padding:12px;text-align:center;cursor:pointer" onclick="openChanAcc(\''+tab+'\')"><span style="color:var(--blue);font-weight:600;font-size:13px"><i class="ti ti-plus"></i> Khai tài khoản nhận tiền</span></div>'));
  var card='<div class="card"><div class="row" style="margin-bottom:10px"><b style="font-size:16px;color:'+x[1]+'"><i class="ti '+x[2]+'"></i> '+x[0]+'</b></div>'+

    '<div class="field"><label>Phí khác / đơn (₫) <span class="opt">· nếu có</span></label><input type="tel" inputmode="numeric" value="'+(c.fee||0)+'" onchange="chanFeeSave(\''+tab+'\',this.value)"></div>'+
    '<div style="border-top:1px solid var(--line2);margin-top:6px;padding-top:12px">'+accBlock+'</div>'+
  '</div>';
  return{html:'<div class="screen" style="background:var(--bg)">'+appbar('Cấu hình kênh bán',{right:'<i class="ti ti-layout-dashboard" style="cursor:pointer" title="Tổng quan FoodApp" onclick="go(\'foodapphub\')"></i>'})+

/* ===== Báo cáo đối soát: breakdown từng đơn sàn (gross → net) ===== */
function dsToggle(id){if(!S._dsOpen)S._dsOpen={};S._dsOpen[id]=!S._dsOpen[id];render('doisoat');}
function dsKv(l,r,col){return '<div class="kv" style="font-size:12.5px;padding:4px 0"><span class="muted">'+l+'</span><b'+(col?' style="color:'+col+'"':'')+'>'+r+'</b></div>';}
function renderDoiSoatBody(){
  var sanOrders=(S.realOrders||[]).filter(isSanOrder);
  var settled=sanOrders.filter(function(o){return o.settled;});
  var groups=dsGroups();
  function dcard(o){var open=S._dsOpen&&S._dsOpen[o.id];var x=PLAT[o.source];
    var body=open?'<div style="border-top:1px solid var(--line2);margin-top:8px;padding-top:6px">'+
      dsKv('Doanh thu (giá đơn)',money(o.total),'')+
      dsKv('− Hoa hồng '+x[0]+' ('+sanRate(o.source)+'%)','−'+money(sanComm(o)),'var(--danger)')+
      (sanKm(o)?dsKv('− Khuyến mãi','−'+money(sanKm(o)),'var(--danger)'):'')+
      (sanTaxRate(o.source)==4.5
        ? dsKv('− Thuế GTGT (3%)','−'+money(sanTaxGtgt(o)),'var(--danger)')+dsKv('− Thuế TNCN (1,5%)','−'+money(sanTaxTncn(o)),'var(--danger)')
        : dsKv('− Thuế sàn ('+sanTaxRate(o.source)+'%)','−'+money(sanTax(o)),'var(--danger)'))+
      (sanFee(o)?dsKv('− Phí khác','−'+money(sanFee(o)),'var(--danger)'):'')+
      '<div class="kv" style="border-top:1px solid var(--line);margin-top:4px;padding-top:6px;font-size:13px"><b>Thực nhận (net)</b><b style="color:var(--ok)">+'+money(sanNet(o))+'</b></div></div>':'';
    return '<div class="card" style="border-left:3px solid '+x[1]+';margin-bottom:8px"><div class="row" onclick="dsToggle(\''+o.id+'\')" style="cursor:pointer"><div style="flex:1"><b style="font-size:13.5px"><i class="ti '+x[2]+'" style="color:'+x[1]+'"></i> '+x[0]+' · '+(o.id||'')+'</b>'+(o.settled?' <span class="pill ok" style="font-size:9px">đã về '+quyAccName(o.settleAcc)+'</span>':'')+'<div class="muted tiny">Gross '+money(o.total)+' → thực nhận <b style="color:var(--ok)">'+money(sanNet(o))+'</b></div></div><i class="ti ti-chevron-'+(open?'up':'down')+'" style="color:var(--ink3)"></i></div>'+body+'</div>';
  }
  function gcard(g){var sel=S._dsSel&&S._dsSel[g.key];var open=S._dsOpen&&S._dsOpen[g.key];var x=PLAT[g.src];
    var head='<div class="row" onclick="dsSelToggle(\''+g.key+'\')" style="cursor:pointer;align-items:center">'+
      '<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(sel?x[1]:'#ccc')+';background:'+(sel?x[1]:'#fff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(sel?'<i class="ti ti-check" style="color:#fff;font-size:14px"></i>':'')+'</div>'+
      '<div style="flex:1;margin-left:10px;min-width:0"><b style="font-size:13.5px"><i class="ti '+x[2]+'" style="color:'+x[1]+'"></i> '+x[0]+' · '+g.label+'</b><div class="muted tiny">'+g.orders.length+' đơn · net dự kiến</div></div>'+
      '<b style="color:#B26A00;white-space:nowrap">~'+money(g.net)+'</b></div>';
    var toggle='<div onclick="dsToggle(\''+g.key+'\')" style="color:var(--blue);font-size:12px;cursor:pointer;margin-top:8px">'+(open?'Ẩn chi tiết ▴':'Xem '+g.orders.length+' đơn ▾')+'</div>';
    var ordList=open?'<div style="border-top:1px solid var(--line2);margin-top:8px;padding-top:8px">'+g.orders.map(dcard).join('')+'</div>':'';
    return '<div class="card" style="border-left:3px solid '+x[1]+'">'+head+toggle+ordList+'</div>';
  }
  var selG=dsSelectedGroups();var selOrds=dsSelectedOrders();var selNet=selOrds.reduce(function(a,o){return a+sanNet(o);},0);
  var pendNet=groups.reduce(function(a,g){return a+g.net;},0);
  var confirmBtn=selG.length?'<button class="btn" style="margin-top:4px" onclick="openSanConfirm()"><i class="ti ti-circle-check"></i> Tiền đã về ('+selG.length+' lô · ~'+money(selNet)+')</button>':'<button class="btn" disabled style="margin-top:4px;opacity:.4;background:var(--ink3)">Tích chọn lô đã nhận tiền</button>';
  return '<div style="display:flex;flex-direction:column;gap:12px">'+
      '<div class="note"><i class="ti ti-info-circle"></i> Đối chiếu với app sàn. Khi <b>tiền thực về tài khoản</b>, tích chọn lô (gom theo sàn × ngày) rồi bấm <b>"Tiền đã về"</b> để khớp Quỹ. Net = giá đơn − hoa hồng − thuế 4,5% − phí.</div>'+
      (groups.length?'<div><div class="row" style="margin:2px 2px 6px"><b style="font-size:14px">Chờ về <span class="muted tiny" style="font-weight:400">· tích nhiều lô để gộp</span></b><b style="font-size:14px;color:#B26A00">~'+money(pendNet)+'</b></div>'+groups.map(gcard).join('')+confirmBtn+'</div>':'')+
      (settled.length?'<div><div class="row" style="margin:6px 2px 6px"><b style="font-size:14px">Đã về quỹ</b></div>'+settled.map(dcard).join('')+'</div>':'')+
      (!sanOrders.length?'<div class="empty" style="padding:30px"><i class="ti ti-receipt-2"></i><div style="margin-top:8px">Chưa có đơn sàn</div><div class="tiny">Đơn Grab/Shopee/Be sẽ hiện ở đây để đối soát</div></div>':'')+
    '</div>';
}
SCREENS.doisoat=function(){
  if(!proOK())return proScreenGate('Đối soát kênh sàn','Tự tính net từng đơn (trừ hoa hồng, thuế, phí) rồi gom theo sàn × ngày — đối chiếu app sàn, bấm "Tiền đã về" để khớp Quỹ. Tính năng Pro.','doisoat','dongtien');
  return{html:'<div class="screen" style="background:var(--bg)">'+appbar('Đối soát tiền sàn',{right:'<i class="ti ti-settings" style="font-size:19px;cursor:pointer" onclick="go(\'chankenh\')"></i>'})+'<div class="scroll"><div class="pad">'+renderDoiSoatBody()+'</div></div>'+tabbar('money')+'</div>',init:function(){}};
};
/* Lọc theo thời gian (ngữ cảnh cần xem) — chỉ áp cho lịch sử & tổng vào/ra trong kỳ; số dư luôn là hiện tại */
function quyInPeriod(t){return inPeriodT(t,S.quyPeriod||'month','quy');}
function quyPeriodLabel(){var p=S.quyPeriod||'month';return p=='custom'?customRangeLabel('quy'):periodLabel(p).toLowerCase();}
function quyRowDir(r){if(r.type=='thu'||r.type=='pending')return 'in';if(r.type=='chi'||r.type=='void')return 'out';if(r.type=='adjust')return (r.delta>=0?'in':'out');return 'neutral';}
function quyDirSet(d){S.quyDir=d;render('dongtien');}
function accDirSet(d){S.accDir=d;render('accdetail');}
function quyFilterType(t){S.quyFilter=Object.assign({},S.quyFilter,{type:t});render('dongtien');}
function quyFilterAcc(id){S.quyFilter=Object.assign({},S.quyFilter,{acc:id});render('dongtien');toast('Lọc theo '+quyAccName(id));}
function clearQuyFilter(){S.quyFilter={type:'all',acc:'all',kind:'all',time:'all'};rmSheet('qf-dia');render('dongtien');}
function openQuyFilter(){
  var f=S.quyFilter||{};
  function opt(v,lb,cur){return '<option value="'+v+'"'+(cur==v?' selected':'')+'>'+lb+'</option>';}
  mkSheet('qf-dia','<div style="font-size:17px;font-weight:700;margin-bottom:14px">Lọc giao dịch</div>'+
    '<div class="field"><label>Tài khoản</label><select id="qf-acc"><option value="all"'+((f.acc||'all')=='all'?' selected':'')+'>Tất cả tài khoản</option>'+quyAccList().map(function(a){return '<option value="'+a.id+'"'+(f.acc==a.id?' selected':'')+'>'+a.name+'</option>';}).join('')+'</select></div>'+
    '<div class="field"><label>Loại tiền</label><select id="qf-kind">'+opt('all','Tất cả',f.kind||'all')+opt('kd','Kinh doanh',f.kind)+opt('cn','Cá nhân',f.kind)+'</select></div>'+
    '<div class="muted tiny" style="margin:-2px 2px 12px"><i class="ti ti-info-circle"></i> Lọc theo thời gian dùng thanh chọn kỳ ngay trên lịch sử.</div>'+
    '<button class="btn" onclick="applyQuyFilter()">Áp dụng</button>'+
    '<button class="btn ghost" style="margin-top:4px" onclick="clearQuyFilter()">Xoá lọc</button>');
}
function applyQuyFilter(){S.quyFilter=Object.assign({},S.quyFilter,{acc:document.getElementById('qf-acc').value,kind:document.getElementById('qf-kind').value});rmSheet('qf-dia');render('dongtien');}
/* Gợi ý Ví trả sau MoMo — chỉ khi số dư thấp, trung lập, có rào chắn, không lặp lại */
function quyNudge(){
  if(!S.activated||S.quyNudgeOff)return '';
  if(quyTotal()>=500000)return '';
  return '<div class="card" style="border:1px solid #F6BCDC;background:#FDEBF4">'+
    '<div style="display:flex;gap:10px;align-items:flex-start"><div class="ic" style="background:#fff"><i class="ti ti-wallet" style="color:#A50064"></i></div>'+
    '<div style="flex:1"><div style="font-weight:700;font-size:13.5px">Số dư đang ở mức thấp</div>'+
    '<div class="muted tiny" style="margin-top:3px;line-height:1.5">Nếu cần xoay vốn nhập hàng ngắn hạn, MoMo có <b>Ví trả sau</b>. Đây là khoản vay — có phí/lãi theo biểu của MoMo, hãy cân nhắc kỹ khả năng trả trước khi dùng.</div>'+
    '<div style="display:flex;gap:8px;margin-top:10px"><button class="btn sm" style="background:#A50064;flex:1" onclick="go(\'momopay\')">Tìm hiểu</button><button class="btn sec sm" style="flex:1" onclick="S.quyNudgeOff=true;render(\'dongtien\')">Bỏ qua</button></div>'+
    '</div></div></div>';
}
/* ===================== SỔ DÒNG TIỀN ===================== */
SCREENS.dongtien=function(){
  var accs=quyAccList();var total=quyTotal();
  var f=S.quyFilter||{type:'all',acc:'all',kind:'all'};
  var hist=quyHistory().filter(function(r){
    if(!quyInPeriod(r.t))return false;
    if(S.quyDir&&S.quyDir!='all'&&quyRowDir(r)!=S.quyDir)return false;
    if(f.acc&&f.acc!='all'&&r.acc!=f.acc&&r.toAcc!=f.acc)return false;
    if(f.kind&&f.kind!='all'&&(r.kind||'kd')!=f.kind)return false;
    return true;
  });
  var q=(S.quySearch||'').trim().toLowerCase();
  if(q)hist=hist.filter(function(r){return ((r.label||'')+' '+(r.sub||'')+' '+quyAccName(r.acc)).toLowerCase().indexOf(q)>=0;});
  function dayItem(r){
    var col,amt,label=r.label||'Khoản';
    if(r.type=='thu'){col='var(--ok)';amt='+'+money(r.amount);}
    else if(r.type=='chi'){col='var(--danger)';amt='−'+money(r.amount);}
    else if(r.type=='transfer'){col='var(--ink2)';amt=money(r.amount);label='Chuyển tiền';}
    else if(r.type=='void'){col='var(--danger)';amt='−'+money(r.amount);}
    else if(r.type=='pending'){col='var(--ink3)';amt='~'+money(r.amount);label=label||'Chờ sàn đối soát';}
    else {col=r.delta>=0?'var(--ok)':'var(--danger)';amt=(r.delta>=0?'+':'−')+money(Math.abs(r.delta));label='Điều chỉnh số dư';}
    var accLine=quyAccName(r.acc)+(r.type=='transfer'?' → '+quyAccName(r.toAcc):'')+(r.auto?' · tự động':'');
    var ed=r._edit;var click=ed?' onclick="openHistEdit(\''+ed.k+'\','+ed.i+')" style="cursor:pointer"':'';
    return '<div class="li"'+click+'><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">'+label+(r.kind=='cn'?' <span style="color:var(--gold);font-size:10px">· cá nhân</span>':'')+'</div><div style="margin-top:4px"><span style="background:var(--line2);color:var(--ink2);font-size:11px;padding:2px 8px;border-radius:6px;display:inline-block">'+accLine+'</span></div></div><b style="color:'+col+';white-space:nowrap;font-size:14.5px">'+amt+'</b>'+(ed?'<i class="ti ti-chevron-right" style="color:var(--ink3);font-size:15px;margin-left:6px"></i>':'')+'</div>';
  }
  function dayGroups(list){var byday={},order=[];list.forEach(function(r){var d=new Date(r.t||Date.now());var key=d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();if(!byday[key]){byday[key]=[];order.push(key);}byday[key].push(r);});return order.map(function(key){return '<div style="font-weight:700;font-size:13px;color:var(--ink);margin:12px 2px 2px">'+key+'</div><div class="card" style="padding:2px 14px">'+byday[key].map(dayItem).join('')+'</div>';}).join('');}

function dmSetTab(t){S.dmTab=t;render('danhmuc');}
function dmCur(){return (S.dmTab||'chi')=='chi'?(S.catChi=S.catChi||[]):(S.catThu=S.catThu||[]);}
function dmFindG(gid){return dmCur().filter(function(g){return g.id==gid;})[0];}
function dmAddItem(gid){var g=dmFindG(gid);if(!g)return;openTextSheet('Thêm khoản vào "'+g.name+'"','Tên khoản','',function(v){if(!v){toast('Nhập tên');return;}if(!g.items)g.items=[];g.items.push(v);closeTextSheet();render('danhmuc');toast('Đã thêm');});}
function dmEditItem(gid,idx){var g=dmFindG(gid);if(!g)return;openTextSheet('Sửa khoản','Tên khoản',g.items[idx],function(v){if(!v){toast('Nhập tên');return;}g.items[idx]=v;closeTextSheet();render('danhmuc');toast('Đã lưu');});}
function dmDelItem(gid,idx){var g=dmFindG(gid);if(!g)return;g.items.splice(idx,1);render('danhmuc');toast('Đã xóa');}
function dmEditGroup(gid){var g=dmFindG(gid);if(!g)return;openTextSheet('Sửa tên nhóm','Tên nhóm',g.name,function(v){if(!v){toast('Nhập tên');return;}g.name=v;closeTextSheet();render('danhmuc');toast('Đã lưu');});}
function dmDelGroup(gid){var arr=dmCur();var i=arr.findIndex(function(g){return g.id==gid;});if(i<0)return;arr.splice(i,1);render('danhmuc');toast('Đã xóa nhóm');}

}

      '<div class="note" style="margin-bottom:10px"><i class="ti ti-info-circle"></i> '+(isChi?'Nhóm chi chính (Nhập hàng, Vận hành…) → khoản chi tiết bên trong. Nhóm <b>cá nhân</b> không tính vào lãi/lỗ kinh doanh.':'Nhóm thu <b>ngoài bán hàng</b> (góp vốn, thu khác). Tiền bán hàng đã tự động ghi, không cần thêm ở đây.')+'</div>'+
      groups.map(groupCard).join('')+

};

function monIcon(cat){var M={'Cà phê':'ti-coffee','Trà & trà sữa':'ti-cup','Sinh tố / Nước ép':'ti-glass-full','Giải khát':'ti-bottle','Cơm':'ti-bowl','Món nước':'ti-bowl','Ăn vặt':'ti-meatball','Bánh':'ti-cake','Đồ uống':'ti-cup'};return M[cat]||'ti-tools-kitchen-2';}
function monThumb(m){
  if(m.img)return '<div style="width:44px;height:44px;border-radius:10px;'+m.img+';background-size:cover;flex-shrink:0"></div>';
  return '<div style="width:44px;height:44px;border-radius:10px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti '+monIcon(classifyMon(m.name||''))+'" style="font-size:22px;color:var(--blue)"></i></div>';
}
function renderMenuChips(){
  var el=document.getElementById('menu-chips');if(!el)return;
  var groups=menuGroupList();var cur=S.menuCat||'Tất cả';
  if(groups.length<2){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.innerHTML=['Tất cả'].concat(groups).map(function(c){var cesc=c.replace(/'/g,"\\'");return '<span class="slip '+(cur==c?'on':'')+'" style="white-space:nowrap" onclick="S.menuCat=\''+cesc+'\';renderMenuChips();renderMenuList()">'+c+'</span>';}).join('');
}
function renderMenuList(){
  var el=document.getElementById('menu-list');if(!el)return;
  renderMenuChips();
  var q=(S.menuFilter||'').trim().toLowerCase();
  var catSel=S.menuCat||'Tất cả';
  if(!S.menu.length&&!menuGroupList().length){el.innerHTML='<div class="empty" style="padding:30px"><i class="ti ti-tools-kitchen-2"></i><div style="margin-top:8px">Chưa có món nào</div><div class="tiny">Tạo nhóm rồi thêm món, hoặc quét ảnh</div></div>'+addGroupBtn();return;}
  var groups=menuGroupList().filter(function(c){return catSel=='Tất cả'||c==catSel;});
  var filtering=!!q||catSel!='Tất cả';
  var anyMon=false;
  var body=groups.map(function(c){
    var cesc=c.replace(/'/g,"\\'");
    var ms=S.menu.filter(function(m){return monCat(m)==c&&(!q||(m.name||'').toLowerCase().indexOf(q)>=0);});
    if(q&&!ms.length)return '';
    if(ms.length)anyMon=true;
    var rows=ms.map(function(m){return '<div class="li"><div style="display:flex;gap:10px;align-items:center;flex:1">'+monThumb(m)+'<div><div style="font-weight:600;font-size:15px">'+m.name+(m.sample?' <span class="pill demo" style="font-size:9px">mẫu</span>':'')+'</div><div class="muted tiny">'+money(m.price)+(hasConfig(m)?' · '+monOptLabel(m):'')+'</div></div></div>'+
      '<i class="ti ti-pencil" style="font-size:19px;color:var(--ink2);margin-right:14px;cursor:pointer" onclick="openMon('+m.id+')"></i>'+
      '<i class="ti ti-trash" style="font-size:19px;color:var(--danger);cursor:pointer" onclick="delMon('+m.id+')"></i></div>';}).join('');
    if(!ms.length)rows='<div class="muted tiny" style="padding:4px 0 2px">Chưa có món trong nhóm này</div>';
    return '<div class="row" style="margin:16px 0 4px"><b style="font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2)">'+c+' <span class="muted" style="text-transform:none;font-weight:400">('+ms.length+')</span> <i class="ti ti-pencil" style="font-size:13px;color:var(--ink3);cursor:pointer;text-transform:none" onclick="openRenameGroup(\''+cesc+'\')" title="Sửa tên nhóm"></i></b><span class="tiny" style="cursor:pointer;color:var(--blue);font-weight:600" onclick="addMonToGroup(\''+cesc+'\')">+ Thêm món</span></div>'+rows;
  }).join('');
  if(q&&!anyMon){el.innerHTML='<div class="empty" style="padding:30px"><i class="ti ti-zoom-cancel"></i><div style="margin-top:8px">Không tìm thấy món phù hợp</div></div>';return;}
  el.innerHTML=body+(filtering?'':addGroupBtn());
}
function addGroupBtn(){return '<div style="display:flex;gap:8px;margin-top:18px">'+
    '<div class="li" style="flex:1;cursor:pointer;border:1.5px solid var(--blue);border-radius:12px;justify-content:center;color:var(--blue);font-weight:700;padding:12px" onclick="openAddMon()"><i class="ti ti-plus" style="margin-right:6px"></i> Thêm món</div>'+

  var optSection=optGroups.length?('<div style="height:14px"></div><div class="row" style="margin:2px 2px 8px"><b style="font-size:14px"><i class="ti ti-circle-plus"></i> Giá sàn cho topping / món ăn kèm</b></div><div class="muted tiny" style="margin:-4px 2px 10px;line-height:1.5">Set <b>một lần</b> — áp cho mọi món dùng topping đó. Không cần set lại theo từng món.</div>'+optGroups.map(function(g){return '<div class="card"><div style="font-weight:700;font-size:13.5px">'+g.name+'</div>'+g.options.map(function(o,oi){return optRow(g,o,oi);}).join('')+'</div>';}).join('')):'';

      chanPickerBlock()+
      (act.length?(chips+'<div style="height:6px"></div>'+(ms.length?'<div style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>':'<div class="empty"><i class="ti ti-tags"></i><div style="margin-top:8px">Chưa có món</div></div>')+optSection):'<div class="note warn"><i class="ti ti-arrow-up"></i> Chọn ít nhất 1 kênh ở trên để đặt giá theo sàn.</div>')+
    '</div></div>'+
    '<div class="pad" style="border-top:1px solid var(--line)"><button class="btn sec" onclick="back()"><i class="ti ti-arrow-left"></i> Quay lại thực đơn tại quán</button></div>'+

SCREENS.tuychon=function(){
  var tops=S.optionGroups.filter(function(g){return g.kind=='topping';});var ankens=S.optionGroups.filter(function(g){return g.kind=='anken';});var mucs=S.optionGroups.filter(function(g){return g.kind=='mucduong'||g.kind=='mucda'||g.kind=='muc';});

  var addChip=function(gid){return '<span class="chip" style="cursor:pointer;color:var(--ink2);border:1px dashed var(--ink3);background:#fff" onclick="openOptEdit(\''+gid+'\',-1)">+ Thêm</span>';};

    '<div class="note" style="margin:10px 12px 0">Tạo một lần rồi áp cho nhóm món. Bấm vào lựa chọn để sửa, dấu X để xoá.</div>'+
    '<div class="scroll"><div class="pad">';
  if(!food){h+='<div class="row" style="margin:4px 2px 8px"><b style="font-size:14px">Topping</b><span style="color:var(--blue);font-weight:600;font-size:12.5px;cursor:pointer" onclick="addToppingGroup()"><i class="ti ti-plus"></i> Thêm nhóm topping</span></div>';
  tops.forEach(function(g){var ac=ogMonCount(g.id);
    h+='<div class="card" style="margin-bottom:10px"><div class="row"><b style="font-size:13.5px">'+g.name+'</b><span style="display:flex;gap:14px"><i class="ti ti-pencil" style="color:var(--ink2);cursor:pointer;font-size:16px" onclick="renameOG(\''+g.id+'\')"></i><i class="ti ti-trash" style="color:var(--danger);cursor:pointer;font-size:16px" onclick="delOG(\''+g.id+'\')"></i></span></div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:9px 0">'+g.options.map(function(o,i){return optChip(g.id,o,i,true);}).join('')+addChip(g.id)+'</div>'+
      '<div class="row" style="align-items:center;margin-bottom:9px"><span class="muted tiny" style="flex:1">Khách được chọn</span>'+ogSingleSeg(g.id,gSingle(g))+'</div>'+
      '<button class="btn sec sm" onclick="openApplyOG([\''+g.id+'\'],\'Áp topping vào món\')"><i class="ti ti-arrow-bar-to-down"></i> '+(ac?'Đã áp vào '+ac+' món — sửa':'Áp topping vào món')+'</button></div>';
  });}
  // Món ăn kèm — chỉ hiện cho ngành đồ ăn / khác
  if(food||other){h+='<div class="row" style="margin:18px 2px 8px"><div><b style="font-size:14px">Món ăn kèm</b><div class="muted tiny">Thêm sườn, trứng, pate… — cộng tiền, có số lượng</div></div><span style="color:var(--blue);font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap" onclick="addAnkenGroup()"><i class="ti ti-plus"></i> Thêm nhóm</span></div>';
  ankens.forEach(function(g){var aca=ogMonCount(g.id);
    h+='<div class="card" style="margin-bottom:10px"><div class="row"><b style="font-size:13.5px">'+g.name+'</b><span style="display:flex;gap:14px"><i class="ti ti-pencil" style="color:var(--ink2);cursor:pointer;font-size:16px" onclick="renameOG(\''+g.id+'\')"></i><i class="ti ti-trash" style="color:var(--danger);cursor:pointer;font-size:16px" onclick="delOG(\''+g.id+'\')"></i></span></div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:9px 0">'+g.options.map(function(o,i){return optChip(g.id,o,i,true);}).join('')+addChip(g.id)+'</div>'+
      '<div class="row" style="align-items:center;margin-bottom:9px"><span class="muted tiny" style="flex:1">Khách được chọn</span>'+ogSingleSeg(g.id,gSingle(g))+'</div>'+
      '<button class="btn sec sm" onclick="openApplyOG([\''+g.id+'\'],\'Áp món ăn kèm vào món\')"><i class="ti ti-arrow-bar-to-down"></i> '+(aca?'Đã áp vào '+aca+' món — sửa':'Áp vào món')+'</button></div>';
  });}
  // Mức / Cấp độ (chọn 1) — đường/đá (đồ uống) hoặc cấp độ tự thêm (vd mỳ cay)
  h+='<div class="row" style="margin:16px 2px 8px"><div><b style="font-size:14px">Mức / Cấp độ</b><div class="muted tiny">Đường, đá, độ cay… — không tính tiền</div></div><span style="color:var(--blue);font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap" onclick="addMucGroup()"><i class="ti ti-plus"></i> Thêm nhóm</span></div>';
  mucs.forEach(function(g){var acm=ogMonCount(g.id);
    h+='<div class="card" style="margin-bottom:10px"><div class="row"><b style="font-size:13.5px">'+g.name+'</b><span style="display:flex;gap:14px"><i class="ti ti-pencil" style="color:var(--ink2);cursor:pointer;font-size:16px" onclick="renameOG(\''+g.id+'\')"></i><i class="ti ti-trash" style="color:var(--danger);cursor:pointer;font-size:16px" onclick="delOG(\''+g.id+'\')"></i></span></div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:9px 0">'+g.options.map(function(o,i){return optChip(g.id,o,i,false);}).join('')+addChip(g.id)+'</div>'+
      '<div class="row" style="align-items:center;margin-bottom:9px"><span class="muted tiny" style="flex:1">Khách được chọn</span>'+ogSingleSeg(g.id,gSingle(g))+'</div>'+
      '<button class="btn sec sm" onclick="openApplyOG([\''+g.id+'\'],\'Áp mức vào món\')"><i class="ti ti-arrow-bar-to-down"></i> '+(acm?'Đã áp vào '+acm+' món — sửa':'Áp vào món')+'</button></div>';
  });
  var noteCount=S.menu.filter(function(m){return m.useNotes;}).length;h+='<div class="row" style="margin:16px 2px 8px"><b style="font-size:14px">'+(food?'Ghi chú món ăn':'Ghi chú món')+'</b></div>';

  h+='</div></div></div>';
  return{html:h,init:function(){}};
};
function renameOG(id){var g=findOG(id);if(!g)return;openTextSheet('Đổi tên nhóm','Tên nhóm',g.name,function(nn){if(!nn){toast('Nhập tên');return;}g.name=nn;closeTextSheet();render('tuychon');toast('Đã đổi tên');});}
function addToppingGroup(){S.optionGroups.push({id:'og'+Date.now(),name:'Nhóm topping',kind:'topping',options:[]});render('tuychon');toast('Đã tạo nhóm topping');}
var ANKEN_PRESETS=[
  {key:'comtam',name:'Món thêm cơm tấm',items:['Thêm sườn','Thêm trứng ốp','Thêm chả','Thêm bì','Thêm lạp xưởng']},
  {key:'banhmi',name:'Món thêm bánh mì',items:['Thêm pate','Thêm chả','Thêm trứng','Thêm thịt','Thêm xúc xích']},
  {key:'bun',name:'Món thêm bún / phở',items:['Thêm trứng','Thêm bò viên','Thêm giò','Thêm chả']},
  {key:'blank',name:'Tự tạo (để trống)',items:[]}
];
function addAnkenGroup(){
  var dia=document.createElement('div');dia.className='dia';dia.style.display='flex';dia.id='ak-dia';
  dia.innerHTML='<div class="sheet"><div class="grab"></div><div style="font-size:17px;font-weight:700;margin-bottom:2px">Tạo nhóm món ăn kèm</div><div class="muted tiny" style="margin-bottom:12px">Chọn mẫu theo loại quán — sửa lại tên & giá sau.</div>'+
    ANKEN_PRESETS.map(function(p){return '<div class="li" style="cursor:pointer" onclick="makeAnkenGroup(\''+p.key+'\')"><div class="ic" style="background:var(--blue-l)"><i class="ti '+(p.items.length?'ti-tools-kitchen-2':'ti-folder-plus')+'" style="color:var(--blue)"></i></div><div style="flex:1"><div style="font-weight:600;font-size:14px">'+p.name+'</div><div class="muted tiny">'+(p.items.length?p.items.join(', '):'Nhóm trống, tự thêm món')+'</div></div><i class="ti ti-chevron-right" style="color:var(--ink3)"></i></div>';}).join('')+
    '<button class="btn ghost" style="margin-top:8px" onclick="document.getElementById(\'ak-dia\').remove()">Hủy</button></div>';
  ROOT.appendChild(dia);dia.onclick=function(e){if(e.target===dia)dia.remove();};
}
function makeAnkenGroup(key){var p=ANKEN_PRESETS.filter(function(x){return x.key==key;})[0]||{name:'Món ăn kèm',items:[]};S.optionGroups.push({id:'ak'+Date.now(),name:p.name,kind:'anken',options:p.items.map(function(n){return {name:n,price:0};})});var d=document.getElementById('ak-dia');if(d)d.remove();render('tuychon');toast('Đã tạo "'+p.name+'"');}
function addMucGroup(){S.optionGroups.push({id:'muc'+Date.now(),name:'Cấp độ',kind:'muc',options:[{name:'Bình thường',price:0},{name:'Cay vừa',price:0},{name:'Cay nhiều',price:0}]});render('tuychon');toast('Đã tạo nhóm mức/cấp độ — đổi tên & sửa mức');}
function delOG(id){S.optionGroups=S.optionGroups.filter(function(g){return g.id!=id;});S.menu.forEach(function(m){if(m.optGroups)m.optGroups=m.optGroups.filter(function(x){return x!=id;});});render('tuychon');toast('Đã xóa nhóm');}
function openOptEdit(gid,idx){var g=findOG(gid);if(!g)return;var o=idx>=0?g.options[idx]:{name:'',price:0};S._optE={gid:gid,idx:idx,top:isTopping(g)};

    '<div class="field"><label>Tên</label><input id="oe-name" value="'+o.name+'" placeholder="VD: Trân châu"></div>'+
    (isTopping(g)?'<div class="field"><label>Giá cộng thêm</label><input id="oe-price" inputmode="numeric" value="'+(o.price||'')+'" placeholder="0₫"></div>':'')+
    (isTopping(g)?'<label class="li" style="cursor:pointer;padding:8px 0;border-bottom:none"><div style="flex:1"><div style="font-weight:600;font-size:13.5px">Cho bán lẻ</div><div class="muted tiny">Khách gọi thêm đứng riêng (không gắn món chính) — tạo dòng riêng trong đơn. VD trân châu, thêm trứng.</div></div><input type="checkbox" id="oe-retail" '+(o.retail?'checked':'')+' style="width:22px;height:22px;flex-shrink:0;margin-left:10px"></label>':'')+

  ROOT.appendChild(dia);dia.onclick=function(e){if(e.target===dia)dia.remove();};setTimeout(function(){var i=document.getElementById('oe-name');if(i)i.focus();},60);

function saveOptEdit(){var e=S._optE;var g=findOG(e.gid);if(!g)return;var nm=(document.getElementById('oe-name').value||'').trim();if(!nm){toast('Nhập tên');return;}var pr=0;if(e.top){var pe=document.getElementById('oe-price');pr=parseInt((pe&&pe.value||'0').replace(/\D/g,''))||0;}

function delOpt(gid,idx){var g=findOG(gid);if(g)g.options.splice(idx,1);render('tuychon');toast('Đã xóa');}
function openNoteChip(i){S._nc=i;var cur=i>=0?S.noteChips[i]:'';

function delNoteChip(i){S.noteChips.splice(i,1);render('tuychon');toast('Đã xóa');}
function ogAppliedCats(ids){var first=ids[0];var out=[];menuGroupList().forEach(function(c){var ms=S.menu.filter(function(m){return monCat(m)==c;});if(ms.length&&ms.some(function(m){return (m.optGroups||[]).indexOf(first)>=0;}))out.push(c);});return out;}

function ogMonCount(gid){return S.menu.filter(function(m){return ogHasMon(m,gid);}).length;}
function openApplyOG(ids,title){S._aog={gid:ids[0],title:title};var dia=document.createElement('div');dia.className='dia';dia.style.display='flex';dia.id='ao-dia';dia.innerHTML='<div class="sheet" id="ao-sheet"></div>';ROOT.appendChild(dia);dia.onclick=function(e){if(e.target===dia)dia.remove();};renderApplyOG();}
function renderApplyOG(){var el=document.getElementById('ao-sheet');if(!el)return;var gid=S._aog.gid;var cats=menuGroupList();

    (cats.length?cats.map(function(c){var ms=S.menu.filter(function(m){return monCat(m)==c;});if(!ms.length)return '';var allOn=ms.every(function(m){return ogHasMon(m,gid);});var cesc=c.replace(/'/g,"\\'");
      return '<div class="li" style="cursor:pointer;border-bottom:1px solid var(--line2);padding:9px 0;align-items:center" onclick="ogToggleCat(\''+cesc+'\')"><div style="width:20px;height:20px;border-radius:5px;border:2px solid '+(allOn?'var(--blue)':'var(--line)')+';background:'+(allOn?'var(--blue)':'#fff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(allOn?'<i class="ti ti-check" style="color:#fff;font-size:13px"></i>':'')+'</div><b style="flex:1;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2);margin-left:8px">'+c+' <span class="muted" style="text-transform:none;font-weight:400">· cả nhóm</span></b></div>'+
      ms.map(function(m){var on=ogHasMon(m,gid);return '<div class="li" style="cursor:pointer;border-bottom:none;padding:5px 0 5px 28px" onclick="ogToggleMon('+m.id+')"><div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(on?'var(--blue)':'var(--line)')+';background:'+(on?'var(--blue)':'#fff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(on?'<i class="ti ti-check" style="color:#fff;font-size:14px"></i>':'')+'</div><div style="flex:1;font-size:14px">'+m.name+'</div></div>';}).join('');}).join(''):'<div class="muted tiny">Chưa có món nào — tạo món ở Thực đơn trước.</div>')+
    '<button class="btn" style="margin-top:12px" onclick="document.getElementById(\'ao-dia\').remove();render(\'tuychon\')">Xong</button>';}
function ogToggleMon(id){var m=S.menu.find(function(x){return x.id==id;});if(m)ogSetMon(m,S._aog.gid,!ogHasMon(m,S._aog.gid));renderApplyOG();}
function ogToggleCat(c){var gid=S._aog.gid;var ms=S.menu.filter(function(m){return monCat(m)==c;});var allOn=ms.every(function(m){return ogHasMon(m,gid);});ms.forEach(function(m){ogSetMon(m,gid,!allOn);});renderApplyOG();}
function openApplyNotes(){var dia=document.createElement('div');dia.className='dia';dia.style.display='flex';dia.id='an-dia';dia.innerHTML='<div class="sheet" id="an-sheet"></div>';ROOT.appendChild(dia);dia.onclick=function(e){if(e.target===dia)dia.remove();};renderApplyNotes();}

function setupScreen(){
  if(!S.setupRows)S.setupRows=AREA_SUGGEST.map(function(a){return {name:a,on:false,n:''};});

      '<div onclick="toggleSetupRow('+i+')" style="width:24px;height:24px;border-radius:7px;border:2px solid '+(on?'var(--blue)':'var(--ink3)')+';background:'+(on?'var(--blue)':'#fff')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;box-shadow:'+(on?'0 0 0 3px rgba(37,99,235,.15)':'none')+'">'+(on?'<i class="ti ti-check" style="color:#fff;font-size:15px"></i>':'')+'</div>'+

    '<div class="scroll"><div class="pad">'+
      '<div class="note" style="margin-bottom:12px"><i class="ti ti-info-circle"></i> Tích chọn khu vực để mở ô nhập số bàn — hệ thống tự tạo sơ đồ, bạn chỉnh lại được sau.</div>'+rows+
      '<div class="li" style="cursor:pointer;border-bottom:none;padding:9px 0;color:var(--blue);font-weight:600" onclick="addSetupRow()"><i class="ti ti-plus"></i> Thêm khu khác</div>'+
    '</div></div>'+
    '<div class="pad" style="border-top:1px solid var(--line);display:flex;gap:10px"><button class="btn ghost" style="flex:1" onclick="S.setupRows=null;if(!(S.useTable&&S.tables.length>0))S.banSkipped=true;S.nav=[\'home\'];render(\'home\')">Về trang chủ</button><button class="btn" style="flex:1" onclick="createTables()">Tạo</button></div>'+
  '</div>',init:function(){}};
}

        '<i class="ti ti-armchair" style="font-size:22px;color:'+(has?'var(--blue)':'var(--ink2)')+'"></i><div style="font-weight:600;font-size:12.5px;margin-top:3px">'+t.name+'</div>'+
        (has?'<div class="pill" style="background:var(--blue);color:#fff;margin-top:3px;font-size:9px">'+money(has.total)+'</div>':'<div class="pill ok" style="margin-top:3px;font-size:9px">Trống</div>')+'</div>';}).join('')+
    ((mode=='edit'&&!sort)?'<div onclick="addBan(\''+aesc+'\')" style="text-align:center;padding:12px 6px;cursor:pointer;border:1px dashed var(--line);border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="ti ti-plus" style="font-size:22px;color:var(--ink3)"></i><div class="muted tiny" style="margin-top:3px">Thêm bàn</div></div>':'')+
    '</div>';
  h+='</div>';return h;
}
function addAreaQuick(a){if(S.areas.indexOf(a)<0)S.areas.push(a);S.sdTab=a;render('sodoban');}

function bulkAddBan(area){var inp=document.getElementById('bulk-num');var n=parseInt((inp&&inp.value||'').replace(/\D/g,''))||0;if(n<=0){toast('Nhập số bàn');return;}var start=nextBanNum();for(var i=0;i<n;i++){var nm='Bàn '+(start+i);S.tables.push({name:nm,area:area});S.qrTables.push(nm);}render('sodoban');toast('Đã tạo '+n+' bàn');}
function dragTbl(e,name){S._dragTbl=name;if(e.dataTransfer)e.dataTransfer.setData('text',name);}

  return{html:'<div class="screen">'+appbar('Đặt trước')+
    '<div class="note" style="margin:10px 12px 0">Khách nhắn/gọi đặt trước — lưu lại để khỏi gõ lại, làm đúng giờ.</div>'+

  '</div>',init:function(){}};};

SCREENS.dattruoc_new=function(){

      '<div id="pre-cust-list"></div>'+

  }
